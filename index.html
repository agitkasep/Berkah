<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkah</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; padding-bottom: 80px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: white; }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .logo-box { width: 45px; height: 45px; background: #00a86b; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 25px; }
        .user-info h2 { font-size: 18px; font-weight: 700; }
        .user-info p { font-size: 12px; color: #64748b; text-transform: uppercase; }
        .btn-profile { width: 40px; height: 40px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; }

        /* Card Waktu Sholat Utama */
        .hero-card { margin: 0 20px; padding: 25px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 30px; color: white; position: relative; overflow: hidden; }
        .hero-card::after { content: ''; position: absolute; right: -20px; bottom: -20px; width: 150px; height: 150px; background: url('https://www.transparentpng.com/download/mosque/mosque-free-cut-out-29.png'); background-size: contain; background-repeat: no-repeat; opacity: 0.1; }
        .hero-card p { font-size: 12px; font-weight: 600; opacity: 0.9; letter-spacing: 1px; }
        .hero-card h1 { font-size: 32px; margin: 5px 0; font-weight: 700; }
        .hero-card .next-sholat { font-size: 48px; letter-spacing: 2px; }

        /* Grid Jadwal Sholat Kecil */
        .sholat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 20px; }
        .sholat-item { background: rgba(255,255,255,0.15); padding: 8px; border-radius: 12px; text-align: center; }
        .sholat-item span { font-size: 10px; display: block; opacity: 0.8; }
        .sholat-item b { font-size: 12px; }

        /* Statistik Box */
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { padding: 20px; border-radius: 24px; color: white; }
        .stat-card.dark { background: #0f172a; }
        .stat-card.light { background: white; color: #1e293b; border: 1px solid #e2e8f0; }
        .stat-card p { font-size: 10px; font-weight: 600; opacity: 0.7; text-transform: uppercase; margin-bottom: 8px; }
        .stat-card h2 { font-size: 28px; font-weight: 700; }

        /* Menu Utama */
        .menu-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 20px; text-align: center; }
        .menu-btn { background: white; border: 1px solid #f1f5f9; padding: 15px 5px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .menu-btn i { font-size: 20px; }
        .menu-btn span { font-size: 10px; font-weight: 600; color: #64748b; text-transform: uppercase; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 30px; display: flex; justify-content: space-between; border-top: 1px solid #f1f5f9; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; text-decoration: none; }
        .nav-item.active { color: #00a86b; }
        .nav-item span { font-size: 10px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-profile">
            <div class="logo-box">
                <img src="logo.svg" alt="Logo">
            </div>
            <div class="user-info">
                <h2>Berkah</h2>
                <p id="current-date">MEMUAT...</p>
            </div>
        </div>
        <button class="btn-profile">👤</button>
    </div>

    <div class="hero-card">
        <p id="lokasi-name">MEMUAT KOTA...</p>
        <h1 id="label-next">WAKTU SHOLAT</h1>
        <div class="next-sholat" id="main-time">--:--</div>
        
        <div class="sholat-grid">
            <div class="sholat-item"><span>Subuh</span><b id="v-subuh">--:--</b></div>
            <div class="sholat-item"><span>Dzuhur</span><b id="v-dzuhur">--:--</b></div>
            <div class="sholat-item"><span>Ashar</span><b id="v-ashar">--:--</b></div>
            <div class="sholat-item"><span>Maghrib</span><b id="v-maghrib">--:--</b></div>
            <div class="sholat-item"><span>Isya</span><b id="v-isya">--:--</b></div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card dark">
            <p>Pengunjung</p>
            <h2>1.240</h2>
        </div>
        <div class="stat-card light">
            <p>Donatur</p>
            <h2>458</h2>
        </div>
    </div>

    <div class="menu-container">
        <div class="menu-btn">📖<span>Quran</span></div>
        <div class="menu-btn">📿<span>Tasbih</span></div>
        <div class="menu-btn">🛍️<span>Produk</span></div>
        <div class="menu-btn">📊<span>Laporan</span></div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">🏠<span>HOME</span></a>
        <a href="#" class="nav-item">❤️<span>DOA</span></a>
        <a href="#" class="nav-item">💵<span>LAPORAN</span></a>
        <a href="#" class="nav-item">🛡️<span>ADMIN</span></a>
    </nav>

    <script>
        // Update Tanggal
        const now = new Date();
        const tglOptions = { weekday: 'long', day: 'numeric', month: 'short', year: 'numeric' };
        document.getElementById('current-date').innerText = now.toLocaleDateString('id-ID', tglOptions).toUpperCase();

        // Ambil Jadwal Sholat
        async function loadSholat() {
            try {
                // Default Jakarta (1301)
                const y = now.getFullYear();
                const m = now.getMonth() + 1;
                const d = now.getDate();
                const res = await fetch(`https://api.myquran.com/v2/sholat/jadwal/1301/${y}/${m}/${d}`);
                const result = await response.json();
                const jadwal = result.data.jadwal;

                document.getElementById('lokasi-name').innerText = "KOTA " + result.data.lokasi;
                document.getElementById('v-subuh').innerText = jadwal.subuh;
                document.getElementById('v-dzuhur').innerText = jadwal.dzuhur;
                document.getElementById('v-ashar').innerText = jadwal.ashar;
                document.getElementById('v-maghrib').innerText = jadwal.maghrib;
                document.getElementById('v-isya').innerText = jadwal.isya;
                
                // Tampilkan waktu terdekat (misal Maghrib) di layar utama
                document.getElementById('main-time').innerText = jadwal.maghrib;
                document.getElementById('label-next').innerText = "MAGHRIB";

            } catch (err) {
                document.getElementById('lokasi-name').innerText = "KONEKSI BERMASALAH";
            }
        }

        loadSholat();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
