<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkah - Aplikasi Doa & Sholat</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00a86b">
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        .header { background: #00a86b; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .card-sholat { background: linear-gradient(135deg, #00a86b, #15d18b); color: white; margin: 20px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .jadwal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .waktu-item { text-align: center; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 10px; }
        .waktu-item span { display: block; font-size: 0.8em; }
        .waktu-item b { font-size: 1.1em; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .menu-item { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .menu-item img { width: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <img src="logo.svg" alt="Logo" width="50">
        <h1>Berkah</h1>
        <p id="tanggal">Memuat tanggal...</p>
    </div>

    <div class="card-sholat">
        <h3 id="lokasi">Mencari Lokasi...</h3>
        <div class="jadwal-grid" id="jadwal-sholat">
            <div class="waktu-item"><span>Subuh</span><b id="subuh">--:--</b></div>
            <div class="waktu-item"><span>Dzuhur</span><b id="dzuhur">--:--</b></div>
            <div class="waktu-item"><span>Ashar</span><b id="ashar">--:--</b></div>
            <div class="waktu-item"><span>Maghrib</span><b id="maghrib">--:--</b></div>
            <div class="waktu-item"><span>Isya</span><b id="isya">--:--</b></div>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><h3>Quran</h3></div>
        <div class="menu-item"><h3>Tasbih</h3></div>
        <div class="menu-item"><h3>Produk</h3></div>
        <div class="menu-item"><h3>Laporan</h3></div>
    </div>

    <script>
        // Set Tanggal
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('tanggal').innerText = new Date().toLocaleDateString('id-ID', options);

        // Ambil Jadwal Sholat (Default Jakarta jika lokasi ditolak)
        async function getJadwal(cityId = "1301") {
            const y = new Date().getFullYear();
            const m = new Date().getMonth() + 1;
            const d = new Date().getDate();
            
            try {
                const response = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${cityId}/${y}/${m}/${d}`);
                const data = await response.json();
                const j = data.data.jadwal;
                
                document.getElementById('lokasi').innerText = data.data.lokasi;
                document.getElementById('subuh').innerText = j.subuh;
                document.getElementById('dzuhur').innerText = j.dzuhur;
                document.getElementById('ashar').innerText = j.ashar;
                document.getElementById('maghrib').innerText = j.maghrib;
                document.getElementById('isya').innerText = j.isya;
            } catch (e) {
                document.getElementById('lokasi').innerText = "Gagal memuat jadwal";
            }
        }

        // Jalankan fungsi
        getJadwal();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
