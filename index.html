<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkah - Aplikasi Islami</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f4f7f6 0%, #e8f5e8 100%); color: #1e293b; padding-bottom: 40px; min-height: 100vh; }
        
        /* Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,168,107,0.1); box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 100;
        }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .logo-box { 
            width: 45px; height: 45px; background: linear-gradient(135deg, #00a86b, #00d084); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: 700; font-size: 18px; box-shadow: 0 4px 15px rgba(0,168,107,0.3);
        }
        .user-info h2 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #00a86b, #00d084); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-info p { font-size: 10px; color: #64748b; font-weight: 600; }

        /* Doa Container */
        .doa-container { 
            margin: 20px; padding: 25px; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 24px; text-align: center; border-left: 6px solid #00a86b; 
            box-shadow: 0 8px 32px rgba(0,168,107,0.1); height: auto;
        }
        .doa-judul { font-size: 14px; font-weight: 700; color: #1e293b; margin-bottom: 15px; text-transform: uppercase; }
        .doa-arab { 
            font-size: 24px; font-weight: 700; margin-bottom: 12px; line-height: 1.8; 
            color: #0f172a; direction: rtl; font-family: 'Amiri', serif;
        }
        #latin-doa { font-size: 13px; color: #00a86b; margin-bottom: 10px; font-weight: 600; line-height: 1.4; }
        .doa-arti { font-size: 12px; color: #475569; font-style: italic; line-height: 1.6; }

        /* Jadwal Sholat */
        .sholat-mini { margin: 0 20px 25px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .sholat-box { 
            background: linear-gradient(135deg, #00a86b, #00d084); color: white; padding: 14px 8px; 
            border-radius: 16px; text-align: center; font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,168,107,0.2);
        }
        .sholat-box span { font-size: 9px; display: block; opacity: 0.9; text-transform: uppercase; }
        .sholat-box b { font-size: 13px; display: block; font-weight: 800; }

        /* Menu Grid (9 Kotak dengan Animasi Asli) */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 0 20px; }
        .menu-item { 
            background: rgba(255,255,255,0.85); padding: 20px 12px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; text-align: center; 
            text-decoration: none; color: inherit; border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .menu-item::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        .menu-item:hover::before { left: 100%; }
        .menu-item:hover { 
            transform: translateY(-8px) scale(1.02); border-color: #00a86b; 
            box-shadow: 0 15px 35px rgba(0,168,107,0.25); background: white;
        }
        .menu-icon { font-size: 28px; margin-bottom: 10px; transition: transform 0.3s ease; }
        .menu-item:hover .menu-icon { transform: scale(1.2); }
        .menu-item span { font-size: 10px; font-weight: 700; color: #334155; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-profile">
            <div class="logo-box">B</div>
            <div class="user-info">
                <h2>BERKAH</h2>
                <p id="tgl-jam">Memuat waktu...</p>
                <small id="lokasi-text" style="color: #00a86b; font-size: 9px; font-weight: bold;">Mencari lokasi...</small>
            </div>
        </div>
        <div style="cursor:pointer; font-size: 20px;">👤</div>
    </div>

    <div class="doa-container">
        <div class="doa-judul" id="judul-doa">Doa Hari Ini</div>
        <div class="doa-arab" id="arab-doa">...</div>
        <div id="latin-doa"></div>
        <div class="doa-arti" id="arti-doa">...</div>
    </div>

    <div class="sholat-mini">
        <div class="sholat-box"><span>Subuh</span><b id="j-Fajr">--:--</b></div>
        <div class="sholat-box"><span>Dzuhur</span><b id="j-Dhuhr">--:--</b></div>
        <div class="sholat-box"><span>Ashar</span><b id="j-Asr">--:--</b></div>
        <div class="sholat-box"><span>Maghrib</span><b id="j-Maghrib">--:--</b></div>
        <div class="sholat-box"><span>Isya</span><b id="j-Isha">--:--</b></div>
    </div>

    <div class="menu-grid">
        <a href="#" class="menu-item"><div class="menu-icon">🕌</div><span>Waktu Sholat</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">📖</div><span>Al-Qur'an</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">📚</div><span>Hadist</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">💼</div><span>Info Loker</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">📰</div><span>Berita Islami</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">🛠️</div><span>Alat Sholeh</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">🛒</div><span>Toko Muslim</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">🎁</div><span>Donasi</span></a>
        <a href="https://wa.me/6281234567890" class="menu-item"><div class="menu-icon">💬</div><span>Chat WA</span></a>
    </div>

    <script>
        const widgetDoa = [
            { judul: "Doa sebelum tidur", arab: "بِسْمِكَ االلّٰهُمَّ اَحْيَا وَبِاسْمِكَ اَمُوْتُ", latin: "Bismikallaahumma ahyaa wa ammuut", arti: "Dengan menyebut nama Allah, aku hidup dan aku mati" },
            { judul: "Doa bangun tidur", arab: "اَلْحَمْدُ ِللهِ الَّذِىْ اَحْيَانَا بَعْدَمَآ اَمَاتَنَا وَاِلَيْهِ النُّشُوْرُ", latin: "Alhamdu lillahil ladzii ahyaanaa ba’da maa amaa tanaa wa ilahin nusyuuru", arti: "Segala puji bagi Allah yang telah menghidupkan kami sesudah kami mati dan kepada-Nya kami dikembalikan" },
            { judul: "Doa masuk kamar mandi", arab: "اَللّٰهُمَّ اِنّىْ اَعُوْذُبِكَ مِنَ الْخُبُثِ وَالْخَبَآئِثِ", latin: "Allahumma Innii a'uudzubika minal khubutsi wal khoaaitsi", arti: "Ya Allah, aku berlindung pada-Mu dari godaan setan laki-laki dan setan perempuan" },
            { judul: "Doa keluar rumah", arab: "بِسْمِ اللهِ تَوَكَّلْتُ عَلَى اللهِ لاَحَوْلَ وَلاَقُوَّةَ اِلاَّ بِالله", latin: "Bismillaahi tawakkaltu 'alalloohi laa hawlaa walaa quwwata illaa bilaahi", arti: "Dengan menyebut nama Allah aku bertawakal kepada Allah, tiada daya kekuatan melainkan dengan pertolongan Allah." },
            { judul: "Doa sebelum membaca Al-Qur'an", arab: "اَللّٰهُمَّ افْتَحْ عَلَىَّ حِكْمَتَكَ وَانْشُرْ عَلَىَّ رَحْمَتَكَ وَذَكِّرْنِىْ مَانَسِيْتُ", latin: "Allahummaftah 'alayya hikmataka wansyur 'alayya rohmataka wa dzakkirnii maanasiitu", arti: "Ya Allah bukakanlah hikmah-Mu padaku, bentangkanlah rahmat-Mu padaku dan ingatkanlah aku terhadap apa yang aku lupa." }
        ];

        function updateUI() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('tgl-jam').innerText = now.toLocaleDateString('id-ID', options);
            
            const doaIndex = now.getDate() % widgetDoa.length;
            const doa = widgetDoa[doaIndex];
            document.getElementById('judul-doa').innerText = doa.judul;
            document.getElementById('arab-doa').innerText = doa.arab;
            document.getElementById('latin-doa').innerText = doa.latin;
            document.getElementById('arti-doa').innerText = doa.arti;
        }

        async function getSholat() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    document.getElementById('lokasi-text').innerText = `📍 Lokasi: Aktif (${latitude.toFixed(2)}, ${longitude.toFixed(2)})`;
                    try {
                        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=20`);
                        const data = await res.json();
                        updateSholatUI(data.data.timings);
                    } catch (e) { fallback(); }
                }, () => { fallback(); });
            } else { fallback(); }
        }

        function updateSholatUI(t) {
            const list = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            list.forEach(k => document.getElementById(`j-${k}`).innerText = t[k]);
        }

        async function fallback() {
            document.getElementById('lokasi-text').innerText = "📍 Lokasi: Jakarta (Default)";
            const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Jakarta&country=Indonesia&method=20`);
            const data = await res.json();
            updateSholatUI(data.data.timings);
        }

        setInterval(updateUI, 1000);
        updateUI();
        getSholat();
    </script>
</body>
</html>
