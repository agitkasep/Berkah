<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berkah - Aplikasi Islami</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #f4f7f6 0%, #e8f5e8 100%); color: #1e293b; padding-bottom: 40px; min-height: 100vh; }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,168,107,0.1); position: sticky; top: 0; z-index: 100;
        }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .logo-box { 
            width: 45px; height: 45px; background: linear-gradient(135deg, #00a86b, #00d084); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: 700; font-size: 18px;
        }
        .user-info h2 { font-size: 18px; font-weight: 700; color: #00a86b; }
        .user-info p { font-size: 10px; color: #64748b; font-weight: 600; }

        .doa-container { 
            margin: 20px; padding: 25px; background: white;
            border-radius: 24px; text-align: center; border-left: 6px solid #00a86b; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }
        .doa-judul { font-size: 14px; font-weight: 700; color: #00a86b; margin-bottom: 12px; text-transform: uppercase; }
        .doa-arab { font-size: 22px; font-weight: 700; margin-bottom: 12px; line-height: 1.8; direction: rtl; font-family: 'Amiri', serif; }
        .doa-arti { font-size: 12px; color: #64748b; font-style: italic; line-height: 1.5; }

        .sholat-mini { margin: 0 20px 25px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .sholat-box { background: white; padding: 12px 5px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; }
        .sholat-box span { font-size: 9px; display: block; margin-bottom: 4px; opacity: 0.8; }
        .sholat-box b { font-size: 12px; display: block; }

        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px; }
        .menu-item { background: white; padding: 15px 10px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #334155; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
        .menu-icon { font-size: 24px; margin-bottom: 8px; }
        .menu-item span { font-size: 10px; font-weight: 700; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-profile">
            <div class="logo-box">B</div>
            <div class="user-info">
                <h2>BERKAH</h2>
                <p id="tgl-jam">Memuat...</p>
                <small id="lokasi-text" style="font-size: 8px; color: #00a86b;">Mencari lokasi...</small>
            </div>
        </div>
    </div>

    <div class="doa-container">
        <div class="doa-judul" id="judul-doa">Doa Harian</div>
        <div class="doa-arab" id="arab-doa">...</div>
        <div id="latin-doa" style="font-size: 11px; color: #00a86b; margin-bottom: 8px; font-weight: 600;"></div>
        <div class="doa-arti" id="arti-doa">...</div>
    </div>

    <div class="sholat-mini">
        <div class="sholat-box"><span>Subuh</span><b id="j-Fajr">--:--</b></div>
        <div class="sholat-box"><span>Dzuhur</span><b id="j-Dhuhr">--:--</b></div>
        <div class="sholat-box"><span>Ashar</span><b id="j-Asr">--:--</b></div>
        <div class="sholat-box"><span>Maghrib</span><b id="j-Maghrib">--:--</b></div>
        <div class="sholat-box"><span>Isya</span><b id="j-Isha">--:--</b></div>
    </div>

    <div class="menu-grid">
        <a href="#" class="menu-item"><div class="menu-icon">🕌</div><span>Jadwal</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">📖</div><span>Al-Qur'an</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">📚</div><span>Hadist</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">💼</div><span>Loker</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">📰</div><span>Berita</span></a>
        <a href="#" class="menu-item"><div class="menu-icon">💬</div><span>Chat WA</span></a>
    </div>

    <script>
        const widgetDoa = [
            { judul: "Doa sebelum tidur", arab: "بِسْمِكَ االلّٰهُمَّ اَحْيَا وَبِاسْمِكَ اَمُوْتُ", latin: "Bismikallaahumma ahyaa wa ammuut", arti: "Dengan menyebut nama Allah, aku hidup dan aku mati" },
            { judul: "Doa bangun tidur", arab: "اَلْحَمْدُ ِللهِ الَّذِىْ اَحْيَانَا بَعْدَمَآ اَمَاتَنَا وَاِلَيْهِ النُّشُوْرُ", latin: "Alhamdu lillahil ladzii ahyaanaa ba’da maa amaa tanaa wa ilahin nusyuuru", arti: "Segala puji bagi Allah yang telah menghidupkan kami sesudah kami mati dan kepada-Nya kami dikembalikan" },
            { judul: "Doa masuk kamar mandi", arab: "اَللّٰهُمَّ اِنّىْ اَعُوْذُبِكَ مِنَ الْخُبُثِ وَالْخَبَآئِثِ", latin: "Allahumma Innii a'uudzubika minal khubutsi wal khoaaitsi", arti: "Ya Allah, aku berlindung pada-Mu dari godaan setan laki-laki dan setan perempuan" },
            { judul: "Doa ketika bercermin", arab: "اَلْحَمْدُ ِللهِ كَمَا حَسَّنْتَ خَلْقِىْ فَحَسِّـنْ خُلُقِىْ", latin: "Alhamdulillaahi kamaa hassanta kholqii fahassin khuluqii", arti: "Segala puji bagi Allah, baguskanlah budi pekertiku sebagaimana Engkau telah membaguskan rupa wajahku" },
            { judul: "Doa keluar rumah", arab: "بِسْمِ اللهِ تَوَكَّلْتُ عَلَى اللهِ لاَحَوْلَ وَلاَقُوَّةَ اِلاَّ بِالله", latin: "Bismillaahi tawakkaltu 'alalloohi laa hawlaa walaa quwwata illaa bilaahi", arti: "Dengan menyebut nama Allah aku bertawakal kepada Allah, tiada daya kekuatan melainkan dengan pertolongan Allah." },
            { judul: "Doa masuk rumah", arab: "اَللّٰهُمَّ اِنّىْ اَسْأَلُكَ خَيْرَالْمَوْلِجِ وَخَيْرَالْمَخْرَجِ بِسْمِ اللهِ وَلَجْنَا وَبِسْمِ اللهِ خَرَجْنَا وَعَلَى اللهِ رَبّنَا تَوَكَّلْنَا", latin: "Allahumma innii as-aluka khoirol mauliji wa khoirol makhroji...", arti: "Ya Allah, sesungguhnya aku mohon kepada-Mu baiknya tempat masuk dan baiknya tempat keluar..." },
            { judul: "Doa ilmu bermanfaat", arab: "اَللّٰهُمَّ اِنِّى اَسْأَلُكَ عِلْمًا نَافِعًا وَرِزْقًا طَيِّبًا وَعَمَلاً مُتَقَبَّلاً", latin: "Allahumma innii as-aluka 'ilmaan naafi'aan...", arti: "Ya Allah, sesungguhnya aku mohon kepada-Mu ilmu yang berguna, rezki yang baik dan amal yang diterima." },
            { judul: "Doa sebelum belajar", arab: "يَارَبِّ زِدْنِىْ عِلْمًا وَارْزُقْنِىْ فَهْمًا", latin: "Yaa robbi zidnii 'ilman warzuqnii fahmaa", arti: "Ya Allah, tambahkanlah aku ilmu dan berikanlah aku rizqi akan kepahaman" },
            { judul: "Doa sesudah belajar", arab: "اَللّٰهُمَّ اِنِّى اِسْتَوْدِعُكَ مَاعَلَّمْتَنِيْهِ فَارْدُدْهُ اِلَىَّ عِنْدَ حَاجَتِىْ", latin: "Allaahumma innii astaudi'uka maa 'allamtaniihi...", arti: "Ya Allah, sesungguhnya aku menitipkan kepada Engkau ilmu-ilmu yang telah Engkau ajarkan kepadaku..." },
            { judul: "Doa sebelum wudhu", arab: "نَوَيْتُ الْوُضُوْءَ لِرَفْعِ الْحَدَثِ اْلاَصْغَرِ فَرْضًا لِلّٰهِ تَعَالَى", latin: "Nawaitul whudu-a lirof'il hadatsii ashghori...", arti: "Saya niat berwudhu untuk menghilangkan hadast kecil fardu karena Allah ta'ala" },
            { judul: "Doa setelah wudhu", arab: "اَشْهَدُ اَنْ لاَّاِلَهَ اِلاَّاللهُ وَحْدَهُ لاَشَرِيْكَ لَهُ", latin: "Asyhadu allaa ilaaha illalloohu wahdahuu...", arti: "Aku bersaksi, tidak ada Tuhan selain Allah Yang Maha Esa..." },
            { judul: "Doa sebelum baca Al-Qur'an", arab: "اَللّٰهُمَّ افْتَحْ عَلَىَّ حِكْمَتَكَ وَانْشُرْ عَلَىَّ رَحْمَتَكَ", latin: "Allahummaftah 'alayya hikmataka...", arti: "Ya Allah bukakanlah hikmahMu padaku, bentangkanlah rahmatMu padaku..." },
            { judul: "Doa setelah baca Al-Qur'an", arab: "اَللّٰهُمَّ ارْحَمْنِىْ بِالْقُرْآنِ. وَاجْعَلْهُ لِىْ اِمَامًا وَنُوْرًا", latin: "Allahummarhamnii bil qur'aani...", arti: "Ya Allah, rahmatilah aku dengan Al-Quran yang agung..." },
            { judul: "Doa sebelum mandi", arab: "اَللّٰهُمَّ اغْفِرْلِى ذَنْبِى وَوَسِّعْ لِى فِىْ دَارِىْ", latin: "Allahummaghfirlii dzambii...", arti: "Ya Allah ampunilah dosa kesalahanku dan berilah keluasaan di rumahku..." },
            { judul: "Doa berpergian", arab: "اَللّٰهُمَّ هَوِّنْ عَلَيْنَا سَفَرَنَا هَذَا", latin: "Allahumma hawwin 'alainaa safaranaa...", arti: "Ya Allah, mudahkanlah kami berpergian ini, dan dekatkanlah kejauhannya." },
            { judul: "Doa sampai tujuan", arab: "اَلْحَمْدُ ِللهِ الَّذِى سَلَمَنِى وَالَّذِى اَوَنِى", latin: "Alhamdulillahil ladzi sallamani...", arti: "Segala puji bagi Allah, yang telah menyelamatkan aku..." },
            { judul: "Doa memakai pakaian", arab: "بِسْمِ اللهِ اَللّٰهُمَّ اِنِّى اَسْأَلُكَ مِنْ خَيْرِهِ", latin: "Bismillaahi, Alloohumma innii as-aluka...", arti: "Dengan nama-Mu yaa Allah aku minta kebaikan pakaian ini..." },
            { judul: "Doa pakaian baru", arab: " اَلْحَمْدُ لِلّٰهِ الَّذِىْ كَسَانِىْ هَذَا", latin: "Alhamdu lillaahil ladzii kasaanii...", arti: "Segala puji bagi Allah yang memberi aku pakaian ini..." },
            { judul: "Doa melepas pakaian", arab: "بِسْمِ اللهِ الَّذِيْ لاَ إِلَهَ إِلاَّ هُوَ", latin: "Bismillaahil ladzii laa ilaaha illaa huwa", arti: "Dengan nama Allah yang tiada Tuhan selain-Nya" },
            { judul: "Doa menjelang subuh", arab: "اَللّٰهُمَّ اِنِّى اَعُوْذُ بِكَ مِنْ ضِيْقِ الدُّنْيَا", latin: "Allaahumma inni a'udzubika min dzhiiqid-dunyaa", arti: "Ya Allah! Aku berlindung dari kesempitan dunia dan kiamat." },
            { judul: "Doa menyambut pagi", arab: "اَللّٰهُمَّ بِكَ اَصْبَحْنَا وَبِكَ اَمْسَيْنَا", latin: "Alloohumma bika ashbahnaa wa bika amsainaa", arti: "Ya Allah, dengan-Mu kami berpagi hari dan bersore hari." }
        ];

        function updateUI() {
            const now = new Date();
            const options = { weekday: 'long', day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('tgl-jam').innerText = now.toLocaleDateString('id-ID', options);
            
            const doaIndex = now.getDate() % widgetDoa.length;
            const doa = widgetDoa[doaIndex];
            document.getElementById('judul-doa').innerText = doa.judul;
            document.getElementById('arab-doa').innerText = doa.arab;
            document.getElementById('latin-doa').innerText = doa.latin;
            document.getElementById('arti-doa').innerText = doa.arti;
        }

        async function getSholat() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude, longitude } = pos.coords;
                    document.getElementById('lokasi-text').innerText = `📍 Lokasi: Aktif (${latitude.toFixed(2)})`;
                    try {
                        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${latitude}&longitude=${longitude}&method=20`);
                        const data = await res.json();
                        updateSholatUI(data.data.timings);
                    } catch (e) { fallback(); }
                }, () => { fallback(); });
            } else { fallback(); }
        }

        function updateSholatUI(t) {
            const list = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            list.forEach(k => document.getElementById(`j-${k}`).innerText = t[k]);
        }

        async function fallback() {
            document.getElementById('lokasi-text').innerText = "📍 Lokasi: Jakarta (Default)";
            const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Jakarta&country=Indonesia&method=20`);
            const data = await res.json();
            updateSholatUI(data.data.timings);
        }

        setInterval(updateUI, 1000);
        updateUI();
        getSholat();
    </script>
</body>
</html>
