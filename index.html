    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: linear-gradient(135deg, #f4f7f6 0%, #e8f5e8 100%); color: #1e293b; padding-bottom: 40px; min-height: 100vh; }
        
        /* Header */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,168,107,0.1); box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .logo-box { 
            width: 45px; height: 45px; background: linear-gradient(135deg, #00a86b, #00d084); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: 700; font-size: 18px; box-shadow: 0 4px 15px rgba(0,168,107,0.3);
        }
        .user-info h2 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #00a86b, #00d084); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .user-info p { font-size: 10px; color: #64748b; font-weight: 600; }
        .foto-profil { 
            width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #e2e8f0, #cbd5e1); 
            display: flex; align-items: center; justify-content: center; font-size: 18px; 
            border: 3px solid #00a86b; box-shadow: 0 4px 12px rgba(0,168,107,0.2); cursor: pointer;
            transition: all 0.2s ease;
        }
        .foto-profil:hover { transform: scale(1.05); }

        /* Widget Doa */
        .doa-container { 
            margin: 20px; padding: 25px; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 24px; text-align: center; border-left: 6px solid #00a86b; 
            box-shadow: 0 8px 32px rgba(0,168,107,0.1); position: relative; overflow: hidden;
        }
        .doa-container::before {
            content: '✨'; position: absolute; top: 15px; right: 20px; font-size: 24px; opacity: 0.3;
        }
        .doa-judul { font-size: 16px; font-weight: 700; color: #1e293b; margin-bottom: 12px; }
        .doa-arab { 
            font-size: 24px; font-weight: 700; margin-bottom: 12px; line-height: 1.6; 
            color: #0f172a; direction: rtl; font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #00a86b, #00d084); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .doa-arti { font-size: 12px; color: #475569; font-style: italic; line-height: 1.6; padding: 0 12px; }

        /* Jadwal Sholat Mini */
        .sholat-mini { 
            margin: 0 20px 25px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; 
        }
        .sholat-box { 
            background: linear-gradient(135deg, #00a86b, #00d084); color: white; padding: 14px 8px; 
            border-radius: 16px; text-align: center; font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,168,107,0.3); transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }
        .sholat-box::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.3);
        }
        .sholat-box:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,168,107,0.4); }
        .sholat-box span { font-size: 9px; display: block; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.5px; }
        .sholat-box b { font-size: 13px; display: block; font-weight: 800; }

        /* Menu Grid */
        .menu-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 0 20px 20px; 
        }
        .menu-item { 
            background: rgba(255,255,255,0.85); padding: 20px 12px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; text-align: center; 
            text-decoration: none; color: inherit; border: 2px solid transparent;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .menu-item::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        .menu-item:hover::before { left: 100%; }
        .menu-item:hover { 
            transform: translateY(-8px) scale(1.02); border-color: #00a86b; 
            box-shadow: 0 15px 35px rgba(0,168,107,0.25); background: rgba(255,255,255,0.95);
        }
        .menu-item:active { transform: translateY(-4px) scale(0.98); }
        .menu-icon { font-size: 28px; margin-bottom: 10px; transition: transform 0.3s ease; }
        .menu-item:hover .menu-icon { transform: scale(1.2) rotate(5deg); }
        .menu-item span { 
            font-size: 10px; font-weight: 700; color: #334155; line-height: 1.3; 
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #e2e8f0; border-top: 2px solid #00a86b; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 480px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 15px 20px; }
            .sholat-mini { gap: 10px; margin: 0 15px 20px; }
            .doa-container { margin: 15px; padding: 20px; }
        }
    </style>

        function updateUI() {
            const sekarang = new Date();
            const opsi = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('tgl-jam').innerText = sekarang.toLocaleDateString('id-ID', opsi);
            
            // Doa berganti setiap hari
            const doaIndex = sekarang.getDate() % widgetDoa.length;
            const doa = widgetDoa[doaIndex];
            document.getElementById('judul-doa').innerText = doa.judul;
            document.getElementById('arab-doa').innerText = doa.arab;
            document.getElementById('arti-doa').innerText = doa.arti;
        }

        // FIXED: API jadwal sholat yang benar + fallback
        async function ambilSholat() {
            try {
                // Coba API Aladhan dulu (lebih reliable)
                const sekarang = new Date();
                const tahun = sekarang.getFullYear();
                const bulan = String(sekarang.getMonth() + 1).padStart(2, '0');
                const tanggal = String(sekarang.getDate()).padStart(2, '0');
                
                const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Jakarta&country=Indonesia&method=5`);
                const data = await res.json();
                
                if(data.code === 200) {
                    const j = data.data.timings;
                    document.getElementById('j-subuh').innerText = j.Fajr;
                    document.getElementById('j-dzuhur').innerText = j.Dhuhr;
                    document.getElementById('j-ashar').innerText = j.Asr;
                    document.getElementById('j-maghrib').innerText = j.Maghrib;
                    document.getElementById('j-isya').innerText = j.Isha;
                    return;
                }
            } catch (e) {
                console.warn("API Aladhan gagal, pakai fallback:", e);
            }
            
            // Fallback: Dummy data (ganti dengan koordinat lokasi kamu)
            const dummyTimes = ['04:52', '12:05', '15:18', '18:02', '19:28'];
            const ids = ['j-subuh', 'j-dzuhur', 'j-ashar', 'j-maghrib', 'j-isya'];
            ids.forEach((id, i) => {
                document.getElementById(id).innerText = dummyTimes[i];
            });
        }

        // Inisialisasi
        updateUI();
        ambilSholat();
        
        // Update setiap menit
        setInterval(updateUI, 60000);
        setInterval(ambilSholat, 5 * 60000); // Update sholat setiap 5 menit

        // PWA Ready: Service Worker (opsional)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
