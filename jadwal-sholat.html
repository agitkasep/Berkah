<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sholat Otomatis - Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f4f7f6; color: #1e293b; padding-bottom: 30px; }
        .header { background: #00a86b; color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 25px 25px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; text-decoration: none; color: white; font-size: 20px; }
        .location-box { background: white; margin: -20px 20px 20px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .city-name { font-weight: 700; color: #00a86b; font-size: 18px; text-transform: uppercase; }
        .date-now { font-size: 12px; color: #64748b; margin-top: 5px; }
        .search-area { padding: 0 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; background: white; }
        .sholat-grid { padding: 0 20px; display: grid; gap: 10px; }
        .sholat-item { 
            background: white; padding: 15px 20px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid #00a86b;
        }
        .nama-sholat { font-weight: 600; color: #475569; font-size: 14px; }
        .waktu-sholat { font-weight: 700; color: #1e293b; font-size: 18px; }
        .loading { text-align: center; padding: 40px; color: #64748b; font-size: 14px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-back">⬅️</a>
        <h2>Jadwal Sholat</h2>
    </div>

    <div class="location-box">
        <div id="city-display" class="city-name">Mendeteksi Lokasi...</div>
        <div id="date-display" class="date-now">---</div>
    </div>

    <div class="search-area">
        <input type="text" id="inputKota" placeholder="Ketik nama kota (ex: Bandung)" onchange="cariManual()">
    </div>

    <div id="sholat-container" class="sholat-grid">
        <div class="loading">Menghubungkan ke satelit...</div>
    </div>

    <script>
        const container = document.getElementById('sholat-container');
        const cityDisplay = document.getElementById('city-display');
        const dateDisplay = document.getElementById('date-display');

        // Fungsi Deteksi Lokasi lewat IP (Tanpa perlu klik 'Allow' GPS)
        async function deteksiLokasiOtomatis() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const kotaUser = data.city || "Jakarta";
                ambilJadwal(kotaUser);
            } catch (e) {
                ambilJadwal("Jakarta"); // Fallback jika gagal
            }
        }

        async function ambilJadwal(namaKota) {
            container.innerHTML = '<div class="loading">Memuat jadwal...</div>';
            cityDisplay.innerText = namaKota;

            const tgl = new Date();
            const y = tgl.getFullYear();
            const m = String(tgl.getMonth() + 1).padStart(2, '0');
            const d = String(tgl.getDate()).padStart(2, '0');
            dateDisplay.innerText = `${d}/${m}/${y}`;

            try {
                // Cari ID Kota di MyQuran API
                const resCari = await fetch(`https://api.myquran.com/v2/sholat/kota/cari/${namaKota}`);
                const dataCari = await resCari.json();

                if (dataCari.data && dataCari.data.length > 0) {
                    const idKota = dataCari.data[0].id;
                    const resJadwal = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${idKota}/${y}/${m}/${d}`);
                    const dataJadwal = await resJadwal.json();
                    const j = dataJadwal.data.jadwal;

                    const list = ['subuh', 'terbit', 'dzuhur', 'ashar', 'maghrib', 'isya'];
                    container.innerHTML = "";
                    list.forEach(s => {
                        container.innerHTML += `
                            <div class="sholat-item">
                                <span class="nama-sholat">${s.toUpperCase()}</span>
                                <span class="waktu-sholat">${j[s]}</span>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = '<div class="loading">Kota tidak terdaftar.</div>';
                }
            } catch (err) {
                container.innerHTML = '<div class="loading">Gagal mengambil data.</div>';
            }
        }

        function cariManual() {
            const val = document.getElementById('inputKota').value;
            if(val) ambilJadwal(val);
        }

        // Jalankan otomatis
        deteksiLokasiOtomatis();
    </script>
</body>
</html>
