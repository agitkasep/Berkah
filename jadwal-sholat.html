<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sholat Akurat - Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f0f4f3; color: #1a202c; }
        
        .top-bar { background: #00a86b; color: white; padding: 20px; text-align: center; border-radius: 0 0 30px 30px; position: relative; }
        .back-link { position: absolute; left: 20px; top: 22px; color: white; text-decoration: none; font-size: 20px; }
        
        .main-card { background: white; margin: -20px 20px 20px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); text-align: center; }
        #city-name { font-weight: 700; color: #00a86b; font-size: 1.2rem; margin-bottom: 5px; }
        #full-date { font-size: 0.8rem; color: #718096; }

        .sholat-list { padding: 0 20px; display: grid; gap: 10px; margin-bottom: 30px; }
        .sholat-row { 
            background: white; padding: 15px 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid #edf2f7;
        }
        .sholat-row.active { border-bottom: 3px solid #00a86b; background: #f0fff4; }
        .label { font-weight: 600; color: #4a5568; font-size: 14px; }
        .time { font-weight: 800; color: #2d3748; font-size: 18px; }

        .search-box { padding: 0 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; outline: none; text-align: center; font-weight: 600; }
        
        .loading-state { text-align: center; padding: 40px; color: #718096; font-size: 14px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="index.html" class="back-link">⬅️</a>
        <h3 style="font-size: 16px;">Jadwal Sholat</h3>
    </div>

    <div class="main-card">
        <div id="city-name">Mencari Lokasi...</div>
        <div id="full-date">---</div>
    </div>

    <div class="search-box">
        <input type="text" id="manualCity" placeholder="Cari Kota (Contoh: Jakarta)" onchange="cariManual()">
    </div>

    <div id="display-area" class="sholat-list">
        <div class="loading-state">⏳ Sedang mencocokkan koordinat lokasi Anda...</div>
    </div>

    <script>
        // Data Fallback jika koordinat gagal
        const DEFAULT_CITY = "Jakarta";

        async function initJadwal() {
            try {
                // Step 1: Ambil Koordinat via IP (Sangat Cepat)
                const geoRes = await fetch('https://ipapi.co/json/');
                const geoData = await geoRes.json();
                
                // Ambil Lintang & Bujur
                const lat = geoData.latitude;
                const lon = geoData.longitude;
                
                // Step 2: Cari Kota Terdekat berdasarkan Koordinat ke API MyQuran
                const findCity = await fetch(`https://api.myquran.com/v2/sholat/kota/lokasi?lat=${lat}&lon=${lon}`);
                const cityData = await findCity.json();

                if (cityData.status && cityData.data) {
                    loadJadwal(cityData.data.id, cityData.data.lokasi);
                } else {
                    loadJadwal("1301", "Jakarta"); // ID 1301 adalah Jakarta
                }
            } catch (err) {
                loadJadwal("1301", "Jakarta");
            }
        }

        async function loadJadwal(cityId, cityName) {
            const today = new Date();
            const y = today.getFullYear();
            const m = today.getMonth() + 1;
            const d = today.getDate();

            document.getElementById('city-name').innerText = cityName;
            document.getElementById('full-date').innerText = today.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

            try {
                const res = await fetch(`https://api.myquran.com/v2/sholat/jadwal/${cityId}/${y}/${m}/${d}`);
                const result = await res.json();
                const jadwal = result.data.jadwal;

                const times = [
                    {n: 'Imsak', v: jadwal.imsak},
                    {n: 'Subuh', v: jadwal.subuh},
                    {n: 'Terbit', v: jadwal.terbit},
                    {n: 'Dzuhur', v: jadwal.dzuhur},
                    {n: 'Ashar', v: jadwal.ashar},
                    {n: 'Maghrib', v: jadwal.maghrib},
                    {n: 'Isya', v: jadwal.isya}
                ];

                let html = '';
                times.forEach(t => {
                    html += `
                        <div class="sholat-row">
                            <span class="label">${t.n.toUpperCase()}</span>
                            <span class="time">${t.v}</span>
                        </div>
                    `;
                });
                document.getElementById('display-area').innerHTML = html;
            } catch (e) {
                document.getElementById('display-area').innerHTML = '<div class="loading-state">Gagal memuat jadwal.</div>';
            }
        }

        async function cariManual() {
            const query = document.getElementById('manualCity').value;
            if(!query) return;
            
            try {
                const res = await fetch(`https://api.myquran.com/v2/sholat/kota/cari/${query}`);
                const data = await res.json();
                if(data.data && data.data.length > 0) {
                    loadJadwal(data.data[0].id, data.data[0].lokasi);
                }
            } catch(e) {}
        }

        initJadwal();
    </script>
</body>
</html>
