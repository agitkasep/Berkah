<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sholat Bulanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; padding: 15px; }
        
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Judul Hijau Seperti Gambar */
        .table-header { background: #00a86b; color: white; padding: 15px; text-align: center; }
        .table-header h2 { font-size: 16px; margin-bottom: 5px; }
        .table-header p { font-size: 14px; opacity: 0.9; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #00a86b; color: white; padding: 10px 5px; font-weight: 600; text-transform: uppercase; }
        td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #f0f0f0; }
        
        /* Highlight hari ini */
        .today { background: #e8f5e8; font-weight: bold; color: #00a86b; }
        
        tr:nth-child(even) { background: #fafafa; }
        .back-btn { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #00a86b; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Kembali</a>

    <div class="container">
        <div class="table-header">
            <h2 id="lokasi-title">Jadwal Sholat</h2>
            <p id="bulan-title">Memuat data...</p>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Tgl</th>
                    <th>Subuh</th>
                    <th>Dzuhur</th>
                    <th>Ashar</th>
                    <th>Maghrib</th>
                    <th>Isya</th>
                </tr>
            </thead>
            <tbody id="jadwal-body">
                </tbody>
        </table>
    </div>

    <script>
        async function loadJadwal() {
            const now = new Date();
            const month = now.getMonth() + 1;
            const year = now.getFullYear();
            const day = now.getDate();
            
            // Nama Bulan Indonesia
            const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('bulan-title').innerText = `${namaBulan[now.getMonth()]} ${year}`;

            // Mengambil lokasi (Default Jakarta jika gagal)
            let city = "Jakarta"; 
            document.getElementById('lokasi-title').innerText = `Jadwal Sholat untuk ${city}`;

            try {
                const res = await fetch(`https://api.aladhan.com/v1/calendarByCity/${year}/${month}?city=${city}&country=Indonesia&method=20`);
                const data = await res.json();
                const jadwal = data.data;
                
                let html = "";
                jadwal.forEach((hari) => {
                    const tgl = parseInt(hari.date.gregorian.day);
                    const isToday = tgl === day ? "class='today'" : "";
                    
                    html += `<tr ${isToday}>
                        <td>${tgl}</td>
                        <td>${hari.timings.Fajr.split(' ')[0]}</td>
                        <td>${hari.timings.Dhuhr.split(' ')[0]}</td>
                        <td>${hari.timings.Asr.split(' ')[0]}</td>
                        <td>${hari.timings.Maghrib.split(' ')[0]}</td>
                        <td>${hari.timings.Isha.split(' ')[0]}</td>
                    </tr>`;
                });
                document.getElementById('jadwal-body').innerHTML = html;
            } catch (e) {
                document.getElementById('jadwal-body').innerHTML = "<tr><td colspan='6'>Gagal memuat data</td></tr>";
            }
        }

        loadJadwal();
    </script>
</body>
</html>
