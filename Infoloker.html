<script>
    const data = [
        {
            u: "reraaasovani",
            t: "5 jam",
            s: "Threads",
            c: "Urgently hiring staff purchasing tapi yang sudah berpengalaman di bidangnya lebih dari 2 thn ya untuk area Pasar Minggu Jakarta Selatan. Kirim CV ke email: <span class='email'>reramuliaperkasa@gmail.com</span> Thank u ✨",
            // Link langsung ke pencarian user di Threads
            l: "https://www.threads.net/search?q=purchasing%20pasar%20minggu"
        },
        {
            u: "HRD_Global_Tech",
            t: "2 jam",
            s: "LinkedIn",
            c: "Dibutuhkan segera Operator Produksi untuk penempatan di Cikarang. Usia maks 23 thn. Daftar melalui website resmi kami.",
            // Link langsung ke filter loker operator produksi di LinkedIn
            l: "https://www.linkedin.com/jobs/search/?keywords=operator%20produksi%20cikarang"
        },
        {
            u: "InfoLokerJakarta",
            t: "8 jam",
            s: "Facebook",
            c: "LOKER KURIR MOTOR! Area Jakarta Barat. Gaji pokok + uang bensin. Min punya SIM C aktif.",
            // Link langsung ke grup loker/pencarian FB
            l: "https://www.facebook.com/search/top?q=loker%20kurir%20motor%20jakarta%20barat"
        },
        {
            u: "Agit_Studio",
            t: "1 jam",
            s: "Instagram",
            c: "Looking for Freelance Video Editor! Paham penggunaan AI Tools lebih diutamakan. Kirim portfolio ke DM.",
            // Link ke explore tag video editor
            l: "https://www.instagram.com/explore/tags/loker-video-editor/"
        },
        {
            u: "Bakti_Husada",
            t: "10 jam",
            s: "Threads",
            c: "Lowongan Perawat Gigi (Dental Assistant). Penempatan Jakarta Selatan. Syarat: STR Aktif & Ramah.",
            l: "https://www.threads.net/search?q=perawat%20gigi%20jakarta"
        }
    ];

    function start() {
        const feed = document.getElementById('mainFeed');
        const dateStr = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
        document.getElementById('dateDisplay').innerText = "INFO TERBARU • " + dateStr;

        let html = "";
        data.forEach(item => {
            html += `
            <div class="card">
                <div class="card-top">
                    <div class="avatar">${item.u.charAt(0).toUpperCase()}</div>
                    <div class="user-name">${item.u} <span class="time">• ${item.t}</span></div>
                    <div class="badge">${item.s}</div>
                </div>
                <div class="content">${item.c}</div>
                <div class="footer">
                    <span style="font-size:11px; color:#999">❤️ Tersedia</span>
                    <a href="${item.l}" target="_blank" class="link-src">Lihat Postingan Asli ↗️</a>
                </div>
            </div>`;
        });
        feed.innerHTML = html;
    }

    start();
</script>
