<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumpulan Hadist - Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f4f7f6; color: #1e293b; padding-bottom: 40px; }
        
        .nav-header { 
            display: flex; align-items: center; padding: 15px 20px; 
            background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100;
        }
        .btn-back { text-decoration: none; font-size: 18px; margin-right: 15px; color: #00a86b; cursor: pointer; }
        .title { font-size: 16px; font-weight: 700; }

        /* Pengaturan Perawi */
        .selector-container { padding: 15px 20px; background: white; border-bottom: 1px solid #f1f5f9; }
        select {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0;
            border-radius: 12px; outline: none; font-size: 14px; background: #f8fafc; color: #334155;
            font-weight: 600;
        }

        /* Konten Hadist */
        .hadist-card {
            margin: 15px 20px; padding: 25px 20px; background: white;
            border-radius: 20px; border: 1px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .hadist-meta { font-size: 12px; font-weight: 700; color: #00a86b; margin-bottom: 15px; text-transform: uppercase; }
        .hadist-arab { 
            font-family: 'Amiri', serif; font-size: 24px; text-align: right; 
            line-height: 2.2; margin-bottom: 20px; color: #0f172a; direction: rtl;
        }
        .hadist-indo { font-size: 14px; color: #475569; line-height: 1.6; text-align: justify; }

        /* Navigasi Hadist */
        .pagination { display: flex; justify-content: space-between; padding: 0 20px; gap: 15px; }
        .btn-nav {
            flex: 1; padding: 12px; border-radius: 12px; border: none;
            background: #00a86b; color: white; font-weight: 700; font-size: 14px; cursor: pointer;
        }
        .btn-nav:disabled { background: #cbd5e1; cursor: not-allowed; }

        .loading { text-align: center; padding: 50px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="index.html" class="btn-back">⬅️</a>
        <div class="title">Hadist Digital</div>
    </div>

    <div class="selector-container">
        <select id="perawi" onchange="resetDanMuat()">
            <option value="bukhari">Shahih Bukhari</option>
            <option value="muslim">Shahih Muslim</option>
            <option value="abu-dawud">Sunan Abu Dawud</option>
            <option value="tirmidzi">Sunan Tirmidzi</option>
            <option value="nasai">Sunan Nasai</option>
            <option value="ibnu-majah">Sunan Ibnu Majah</option>
        </select>
    </div>

    <div id="hadist-container">
        <div class="loading">Memuat hadist...</div>
    </div>

    <div class="pagination">
        <button class="btn-nav" id="prev" onclick="gantiHadist(-1)">⬅️ Sebelumnya</button>
        <button class="btn-nav" id="next" onclick="gantiHadist(1)">Selanjutnya ➡️</button>
    </div>

    <script>
        let perawiSekarang = "bukhari";
        let nomorHadist = 1;

        async function muatHadist() {
            const container = document.getElementById('hadist-container');
            const btnPrev = document.getElementById('prev');
            container.innerHTML = '<div class="loading">Mencari hadist...</div>';
            
            btnPrev.disabled = nomorHadist <= 1;

            try {
                const res = await fetch(`https://api.hadits.gading.dev/books/${perawiSekarang}/${nomorHadist}`);
                const json = await res.json();
                
                if (json.code === 200) {
                    const data = json.data.contents;
                    container.innerHTML = `
                        <div class="hadist-card">
                            <div class="hadist-meta">${json.data.name} - No. ${data.number}</div>
                            <div class="hadist-arab">${data.arab}</div>
                            <div class="hadist-indo">${data.id}</div>
                        </div>
                    `;
                    window.scrollTo(0,0);
                } else {
                    container.innerHTML = '<div class="loading">Hadist tidak ditemukan.</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="loading">Gagal mengambil data. Cek koneksi Anda.</div>';
            }
        }

        function gantiHadist(arah) {
            nomorHadist += arah;
            muatHadist();
        }

        function resetDanMuat() {
            perawiSekarang = document.getElementById('perawi').value;
            nomorHadist = 1;
            muatHadist();
        }

        // Jalankan saat pertama buka
        muatHadist();
    </script>
</body>
</html>
