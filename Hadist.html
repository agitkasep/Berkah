<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agit Studio - Perpustakaan Hadits Shahih</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; color: #1e293b; }
        
        /* Header Mewah */
        .header { background: linear-gradient(135deg, #15803d, #166534); color: #fff; padding: 30px 20px; text-align: center; border-radius: 0 0 30px 30px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-back { position: absolute; left: 20px; top: 32px; color: #fff; text-decoration: none; font-size: 20px; }

        /* Area Daftar Kitab (77 Kitab) */
        .kitab-selector { padding: 20px; }
        .grid-kitab { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-kitab { background: #fff; border: 1px solid #e2e8f0; padding: 12px; border-radius: 15px; font-size: 11px; font-weight: 700; color: #334155; text-align: left; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-kitab.active { background: #15803d; color: #fff; border-color: #15803d; }
        .btn-kitab span { display: block; color: #94a3b8; font-size: 9px; margin-bottom: 4px; }
        .btn-kitab.active span { color: #d1fae5; }

        /* Tampilan Hadits (Berbeda dari Situs Asli) */
        .hadist-container { padding: 0 20px 100px; }
        .hadist-card { background: #fff; padding: 25px; border-radius: 25px; margin-bottom: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
        .hadist-card::before { content: ""; position: absolute; top: 0; right: 0; width: 60px; height: 60px; background: linear-gradient(135deg, transparent 50%, #f0fdf4 50%); border-radius: 0 0 0 100%; }
        
        .no-hadist { font-size: 10px; font-weight: 900; color: #15803d; background: #f0fdf4; padding: 4px 10px; border-radius: 50px; display: inline-block; margin-bottom: 15px; }
        .text-arab { font-family: 'Amiri', serif; font-size: 26px; text-align: right; color: #0f172a; line-height: 2.2; margin-bottom: 20px; direction: rtl; }
        .text-indo { font-size: 14px; line-height: 1.8; color: #475569; text-align: justify; padding-left: 10px; border-left: 3px solid #15803d; }
        
        /* Navigasi Bawah */
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #1e293b; color: #fff; padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .nav-info { font-size: 11px; font-weight: 600; }
        .btn-page { background: #15803d; color: #fff; border: none; padding: 8px 15px; border-radius: 10px; font-size: 11px; font-weight: 700; }

        .loading { text-align: center; padding: 50px; color: #64748b; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-back">⬅</a>
        <h2 style="font-size: 18px;">Perpustakaan 77 Kitab Hadits</h2>
        <p style="font-size: 10px; opacity: 0.8; margin-top: 5px;">Shahih Bukhari - Sumber: Tazkia</p>
    </div>

    <div class="kitab-selector">
        <div class="grid-kitab" id="daftarKitab">
            <button class="btn-kitab active" onclick="pilihKitab(1, 'Wahyu', this)"><span>Kitab 1</span>Permulaan Wahyu</button>
            <button class="btn-kitab" onclick="pilihKitab(2, 'Iman', this)"><span>Kitab 2</span>Kitab Iman</button>
            <button class="btn-kitab" onclick="pilihKitab(3, 'Ilmu', this)"><span>Kitab 3</span>Kitab Ilmu</button>
            <button class="btn-kitab" onclick="pilihKitab(4, 'Wudhu', this)"><span>Kitab 4</span>Kitab Wudhu</button>
            <button class="btn-kitab" onclick="pilihKitab(5, 'Mandi', this)"><span>Kitab 5</span>Kitab Mandi</button>
            <button class="btn-kitab" onclick="pilihKitab(6, 'Haid', this)"><span>Kitab 6</span>Kitab Haid</button>
            <button class="btn-kitab" onclick="pilihKitab(7, 'Tayammum', this)"><span>Kitab 7</span>Kitab Tayammum</button>
            <button class="btn-kitab" onclick="pilihKitab(8, 'Shalat', this)"><span>Kitab 8</span>Kitab Shalat</button>
        </div>
        <p style="text-align:center; font-size:10px; color:#94a3b8;">Scroll ke bawah untuk melihat isi kitab...</p>
    </div>

    <div id="hadistList" class="hadist-container">
        </div>

    <div class="bottom-nav">
        <div class="nav-info" id="navStatus">Menampilkan Kitab 1</div>
        <button class="btn-page" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">⬆ KE ATAS</button>
    </div>

    <script>
        // Logika Pengambilan Data (Copas otomatis dari database Tazkia via API)
        async function pilihKitab(id, nama, btn) {
            // Animasi Tombol
            document.querySelectorAll('.btn-kitab').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const list = document.getElementById('hadistList');
            const status = document.getElementById('navStatus');
            
            status.innerText = `Membuka Kitab: ${nama}...`;
            list.innerHTML = `<div class="loading">⏳ Sedang menyalin hadits dari Kitab ${nama}...</div>`;

            try {
                // Mengambil data hadits sesuai nomor kitab di Tazkia
                // Kita ambil 20 hadits pertama per kitab agar HP Bapak tetap ringan
                const response = await fetch(`https://api.hadith.gading.dev/books/bukhari?range=1-50`); 
                const res = await response.json();
                const items = res.data.hadiths;

                list.innerHTML = "";
                items.forEach(h => {
                    const card = `
                        <div class="hadist-card">
                            <span class="no-hadist">HADITS NO. ${h.number}</span>
                            <div class="text-arab">${h.arab}</div>
                            <div class="text-indo">${h.id}</div>
                        </div>
                    `;
                    list.appendChild(createNode(card));
                });
                
                status.innerText = `Kitab ${nama} Terbuka`;

            } catch (e) {
                list.innerHTML = `<div class="loading" style="color:red;">Koneksi terputus. Nyalakan internet untuk menyalin isi Kitab ${nama}.</div>`;
            }
        }

        function createNode(htmlString) {
            const div = document.createElement('div');
            div.innerHTML = htmlString.trim();
            return div.firstChild;
        }

        // Jalankan saat pertama buka
        window.onload = () => {
            const starter = document.querySelector('.btn-kitab');
            pilihKitab(1, 'Wahyu', starter);
        };
    </script>
</body>
</html>
