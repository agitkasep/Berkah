<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahih Bukhari - Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #1e293b; padding-bottom: 50px; }
        .header { background: #00a86b; color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-back { position: absolute; left: 20px; top: 27px; color: white; text-decoration: none; font-size: 20px; }
        
        .filter-section { background: #f8fafc; padding: 15px 20px; position: sticky; top: 75px; z-index: 999; }
        .filter-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 8px; padding-left: 5px; }
        select { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 14px; font-weight: 600; color: #334155; outline: none; background-color: #f8fafc; cursor: pointer; }
        
        .hadist-list { padding: 0 20px; display: grid; gap: 20px; }
        .hadist-card { background: white; padding: 22px; border-radius: 20px; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .hadist-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        .tag-no { background: #00a86b; color: white; padding: 3px 12px; border-radius: 50px; font-size: 11px; font-weight: 700; }
        
        .text-arab { font-family: 'Amiri', serif; font-size: 26px; text-align: right; line-height: 2; color: #0f172a; margin-bottom: 18px; direction: rtl; }
        .text-indo { font-size: 14px; line-height: 1.8; color: #475569; text-align: justify; border-left: 3px solid #00a86b; padding-left: 15px; }
        .status-msg { text-align: center; padding: 60px 20px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-back">⬅️</a>
        <h2 style="font-size: 18px;">Shahih Al-Bukhari</h2>
    </div>

    <div class="filter-section">
        <div class="filter-card">
            <label>Pilih Kategori Shahih Bukhari</label>
            <select id="topikBukhari" onchange="muatHadist()">
                <option value="1">✨ Wahyu & Niat</option>
                <option value="7">🛡️ Kitab Iman</option>
                <option value="52">📚 Kitab Ilmu</option>
                <option value="135">🧼 Wudhu (Thaharah)</option>
                <option value="248">🚿 Mandi Wajib</option>
                <option value="322">🕋 Sholat</option>
                <option value="504">⏰ Waktu Sholat</option>
                <option value="584">🕌 Adzan</option>
                <option value="603">👥 Sholat Berjamaah</option>
                <option value="1308">💰 Zakat</option>
                <option value="1417">🕋 Haji</option>
                <option value="1772">🌙 Puasa</option>
                <option value="1901">🤝 Jual Beli</option>
                <option value="2486">💍 Nikah</option>
                <option value="5023">🥣 Makanan</option>
                <option value="5223">🥤 Minuman</option>
                <option value="5911">🤲 Doa & Dzikir</option>
                <option value="5737">🤝 Adab/Etika</option>
            </select>
        </div>
    </div>

    <div id="container-hadist" class="hadist-list"></div>

    <script>
        const view = document.getElementById('container-hadist');
        const select = document.getElementById('topikBukhari');

        async function ambilData(nomor) {
            try {
                // Menggunakan API MyQuran yang lebih stabil untuk Bukhari
                const res = await fetch(`https://api.myquran.com/v2/hadits/bukhari/${nomor}`);
                const data = await res.json();
                if (data.status) {
                    const h = data.data;
                    return `
                        <div class="hadist-card">
                            <div class="hadist-header">
                                <span style="font-weight:800; color:#00a86b; font-size:11px;">SHAHIH BUKHARI</span>
                                <span class="tag-no">NO. ${h.number}</span>
                            </div>
                            <div class="text-arab">${h.arab}</div>
                            <div class="text-indo">${h.id}</div>
                        </div>
                    `;
                }
            } catch (e) { return ''; }
            return '';
        }

        async function muatHadist() {
            view.innerHTML = '<div class="status-msg">⏳ Mencari bab dalam kitab...</div>';
            const nomorAwal = parseInt(select.value);
            let html = '';

            // Mengambil 3 hadis berurutan dari bab tersebut
            for(let i=0; i<3; i++) {
                html += await ambilData(nomorAwal + i);
            }

            view.innerHTML = html || '<div class="status-msg">Koneksi gagal. Coba pilih kategori lain.</div>';
        }

        // Tampilan Awal: Hadist Niat (Bukhari No 1)
        window.onload = async () => {
            view.innerHTML = '<div class="status-msg">⏳ Menyiapkan kajian...</div>';
            const intro = await ambilData(1);
            view.innerHTML = intro;
        };
    </script>
</body>
</html>
