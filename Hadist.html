<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agit Studio - 4000+ Hadist Shahih</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; color: #1e293b; }
        
        .header { background: #15803d; color: #fff; padding: 25px; text-align: center; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-back { position: absolute; left: 20px; top: 27px; color: #fff; text-decoration: none; font-size: 20px; }

        .search-section { padding: 20px; }
        .search-card { background: #fff; padding: 15px; border-radius: 20px; border: 1px solid #e2e8f0; }
        
        /* Navigasi Topik yang Bisa Digeser */
        .topic-nav { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .topic-nav::-webkit-scrollbar { display: none; }
        .tab-btn { padding: 8px 18px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 50px; font-size: 12px; font-weight: 700; color: #64748b; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: #15803d; color: #fff; border-color: #15803d; }

        .hadist-list { padding: 0 20px 40px; }
        .card { background: #fff; padding: 25px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #e2e8f0; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .arabic { font-family: 'Amiri', serif; font-size: 24px; text-align: right; color: #111827; line-height: 2; margin-bottom: 15px; direction: rtl; }
        .indo { font-size: 14px; line-height: 1.7; color: #334155; text-align: justify; margin-bottom: 12px; }
        .meta { font-size: 11px; font-weight: 800; color: #15803d; background: #f0fdf4; padding: 6px 12px; border-radius: 6px; display: inline-block; }

        .loading-box { text-align: center; padding: 50px; color: #15803d; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-back">⬅</a>
        <h2 style="font-size: 17px;">Shahih Bukhari (4000+ Hadist)</h2>
    </div>

    <div class="search-section">
        <div class="search-card">
            <div style="font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase;">Pilih Kelompok Bahasan:</div>
            <div class="topic-nav">
                <button class="tab-btn active" onclick="loadByRange(1, 50, this)">Iman & Wahyu</button>
                <button class="tab-btn" onclick="loadByRange(51, 150, this)">Ilmu & Thaharah</button>
                <button class="tab-btn" onclick="loadByRange(151, 300, this)">Shalat</button>
                <button class="tab-btn" onclick="loadByRange(301, 500, this)">Zakat & Haji</button>
                <button class="tab-btn" onclick="loadByRange(501, 700, this)">Puasa</button>
                <button class="tab-btn" onclick="loadByRange(701, 1000, this)">Jual Beli</button>
                <button class="tab-btn" onclick="loadByRange(1001, 1500, this)">Nikah & Akhlak</button>
            </div>
        </div>
    </div>

    <div id="hadistContainer" class="hadist-list">
        <!-- Data hadist akan muncul di sini secara otomatis -->
    </div>

    <script>
        // Menggunakan API Hadist Shahih Bukhari yang Ringan
        const container = document.getElementById('hadistContainer');

        async function loadByRange(start, end, btn) {
            // Animasi Tombol Aktif
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            container.innerHTML = `<div class="loading-box">⏳ Membuka ribuan hadist... Mohon tunggu.</div>`;

            try {
                // Mengambil data dari API publik (contoh range 1-20 per klik agar tidak berat)
                const response = await fetch(`https://hadis-api-id.vercel.app/hadith/abu-daud?range=${start}-${start+15}`);
                const data = await response.json();
                
                container.innerHTML = ""; // Bersihkan loading

                data.items.forEach(h => {
                    const card = `
                        <div class="card">
                            <div class="arabic">${h.arab}</div>
                            <div class="indo">${h.id}</div>
                            <div class="meta">📚 Shahih Bukhari - No. ${h.number}</div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                // Pesan bawah
                container.innerHTML += `<p style="text-align:center; font-size:11px; color:#94a3b8;">Menampilkan hadist nomor ${start} sampai ${start+15}.</p>`;

            } catch (error) {
                container.innerHTML = `<div class="loading-box" style="color:red;">Koneksi Gagal. Pastikan internet aktif untuk mengakses 4000 hadist.</div>`;
            }
        }

        // Muat pertama kali
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            loadByRange(1, 50, firstBtn);
        };
    </script>
</body>
</html>
