    <script>
        let perawiSekarang = "bukhari";
        let nomorHadist = 1;

        async function muatHadist() {
            const container = document.getElementById('hadist-container');
            const btnPrev = document.getElementById('prev');
            container.innerHTML = '<div class="loading">Mencari hadist...</div>';
            
            btnPrev.disabled = nomorHadist <= 1;

            try {
                // Mencoba API alternatif yang lebih stabil
                const response = await fetch(`https://api.hadith.gading.dev/books/${perawiSekarang}/${nomorHadist}`);
                
                if (!response.ok) throw new Error("Gagal load API");

                const json = await response.json();
                
                if (json.code === 200 || json.status === 200) {
                    const data = json.data.contents;
                    container.innerHTML = `
                        <div class="hadist-card">
                            <div class="hadist-meta">${json.data.name} - No. ${data.number}</div>
                            <div class="hadist-arab">${data.arab}</div>
                            <div class="hadist-indo">${data.id}</div>
                        </div>
                    `;
                    window.scrollTo(0,0);
                } else {
                    container.innerHTML = '<div class="loading">Hadist tidak ditemukan di nomor ini.</div>';
                }
            } catch (e) {
                // Jika API utama gagal, tampilkan pesan ramah atau coba endpoint lain
                container.innerHTML = `
                    <div class="loading">
                        <p>⚠️ Server API sedang sibuk.</p>
                        <button onclick="muatHadist()" style="margin-top:10px; padding:8px 15px; border-radius:8px; border:none; background:#00a86b; color:white;">Coba Lagi</button>
                    </div>`;
                console.error("Error Detail:", e);
            }
        }

        function gantiHadist(arah) {
            nomorHadist += arah;
            muatHadist();
        }

        function resetDanMuat() {
            perawiSekarang = document.getElementById('perawi').value;
            nomorHadist = 1;
            muatHadist();
        }

        muatHadist();
    </script>
