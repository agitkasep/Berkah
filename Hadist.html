<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kajian Hadist - Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f1f5f9; color: #1e293b; padding-bottom: 40px; }
        .header { background: #00a86b; color: white; padding: 25px 20px; text-align: center; border-radius: 0 0 25px 25px; position: sticky; top: 0; z-index: 1000; }
        .btn-back { position: absolute; left: 20px; top: 27px; color: white; text-decoration: none; font-size: 20px; }
        
        .filter-card { background: white; margin: 15px 20px; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; display: block; margin-bottom: 5px; }
        select { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; font-size: 14px; margin-bottom: 12px; outline: none; background: #f8fafc; }
        
        .btn-cari { width: 100%; padding: 12px; background: #00a86b; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        
        .hadist-list { padding: 0 20px; display: grid; gap: 15px; }
        .hadist-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .hadist-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .perawi-tag { font-weight: 800; color: #00a86b; font-size: 12px; text-transform: uppercase; }
        .nomor-tag { color: #64748b; font-size: 12px; font-weight: 700; }
        .text-arab { font-family: 'Amiri', serif; font-size: 24px; text-align: right; line-height: 1.8; margin-bottom: 15px; direction: rtl; }
        .text-indo { font-size: 14px; line-height: 1.6; color: #475569; text-align: justify; }
        .status-box { text-align: center; padding: 40px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="btn-back">⬅️</a>
        <h2 style="font-size: 18px;">Kajian Fiqih & Hadist</h2>
    </div>

    <div class="filter-card">
        <label>Pilih Perawi</label>
        <select id="selectPerawi">
            <option value="bukhari">Shahih Bukhari</option>
            <option value="muslim">Shahih Muslim</option>
            <option value="abudaud">Sunan Abu Dawud</option>
            <option value="tirmidzi">Sunan Tirmidzi</option>
            <option value="nasai">Sunan Nasai</option>
            <option value="ibnumajah">Sunan Ibnu Majah</option>
            <option value="ahmad">Musnad Ahmad</option>
        </select>

        <label>Topik Kajian</label>
        <select id="selectTopik">
            <option value="1">📖 Wahyu & Iman</option>
            <option value="21">💡 Ilmu Pengetahuan</option>
            <option value="51">🧼 Thaharah (Bersuci)</option>
            <option value="101">🕋 Sholat</option>
            <option value="151">💰 Zakat & Sedekah</option>
        </select>

        <button class="btn-cari" onclick="muatHadist()">LIHAT HADIST</button>
    </div>

    <div id="hadist-view" class="hadist-list"></div>

    <script>
        const view = document.getElementById('hadist-view');

        // Fungsi Ambil Data dengan Backup API
        async function ambilData(slug, nomor) {
            try {
                // Menggunakan API MyQuran yang lebih stabil untuk data hadist
                const response = await fetch(`https://api.myquran.com/v2/hadits/${slug}/${nomor}`);
                const resJson = await response.json();
                
                if (resJson.status) {
                    const h = resJson.data;
                    return `
                        <div class="hadist-card">
                            <div class="hadist-header">
                                <span class="perawi-tag">${slug.toUpperCase()}</span>
                                <span class="nomor-tag">No. ${h.number}</span>
                            </div>
                            <div class="text-arab">${h.arab}</div>
                            <div class="text-indo">${h.id}</div>
                        </div>
                    `;
                }
            } catch (e) {
                return '';
            }
            return '';
        }

        async function muatHadist() {
            const slug = document.getElementById('selectPerawi').value;
            const nomorAwal = document.getElementById('selectTopik').value;
            
            view.innerHTML = '<div class="status-box">⏳ Sedang mengambil data hadist...</div>';
            
            let html = '';
            // Ambil 3 hadist saja agar tidak kena limit server
            for (let i = 0; i < 3; i++) {
                const data = await ambilData(slug, parseInt(nomorAwal) + i);
                html += data;
            }

            view.innerHTML = html || '<div class="status-box">Maaf, server sedang sibuk. Coba ganti perawi atau klik tombol Lihat Hadist lagi.</div>';
        }

        // Tampilkan Shahih Bukhari No 1 saat pertama buka
        window.onload = async () => {
            view.innerHTML = '<div class="status-box">⏳ Menyiapkan kajian utama...</div>';
            const intro = await ambilData('bukhari', 1);
            view.innerHTML = intro;
        };
    </script>
</body>
</html>
