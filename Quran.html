<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agit Studio - Universal Izhar Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a86b; --bg: #121212; --izhar: #ffff00; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; }
        .header { background: var(--primary); padding: 15px; text-align: center; border-bottom: 3px solid #008f5a; }
        #clock { font-size: 22px; font-weight: bold; }
        
        .container { padding: 20px; }
        .ayat-card { background: #1e1e1e; border-radius: 15px; padding: 25px; margin-bottom: 20px; border: 1px solid #333; }
        .teks-arab { 
            font-family: 'Amiri', serif; font-size: 34px; line-height: 2.8; 
            text-align: right; direction: rtl; word-spacing: 8px;
        }

        /* Styling Karakter Izhar */
        .izhar { 
            color: var(--izhar) !important; 
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255,255,0,0.3);
        }
    </style>
</head>
<body>

<div class="header">
    <div id="clock">00:00:00</div>
    <div style="font-size: 10px;">UNIVERSAL IZHAR PARSER PRO</div>
</div>

<div class="container" id="app">
    <div style="text-align:center; padding:50px;">Memproses Seluruh Ayat...</div>
</div>

<script>
    // 1. REGEX ENGINE (Logika Pencarian Hukum Izhar)
    const IZHAR_RULES = {
        // Izhar Halqi: Nun sukun/Tanwin bertemu Alif, Ha, Kha, 'Ain, Ghain, Ha besar
        halqi: /([نًٌٍْ])\s*([أاھهحخعغ])/g,
        
        // Izhar Syafawi: Mim sukun bertemu selain Mim dan Ba
        syafawi: /([مْ])\s*([^مب\s])/g,
        
        // Izhar Qomariyah: Alif Lam bertemu huruf Qomariyah
        qomariyah: /(ال)\s*([أبجحخعغفقكموهي])/g
    };

    // 2. FUNGSI PEMBUNGKUS OTOMATIS
    function applyIzhar(text) {
        let processed = text;

        // Terapkan Hukum 1: Halqi
        processed = processed.replace(IZHAR_RULES.halqi, '<span class="izhar">$1</span> $2');
        
        // Terapkan Hukum 2: Syafawi
        processed = processed.replace(IZHAR_RULES.syafawi, '<span class="izhar">$1</span> $2');
        
        // Terapkan Hukum 3: Qomariyah
        processed = processed.replace(IZHAR_RULES.qomariyah, '<span class="izhar">$1</span>$2');

        return processed;
    }

    // 3. FETCH & RENDER (Bisa untuk semua surat)
    async function loadSurah(nomorSurah = 1) {
        const response = await fetch(`https://equran.id/api/v2/surat/${nomorSurah}`);
        const json = await response.json();
        const container = document.getElementById('app');
        container.innerHTML = '';

        json.data.ayat.forEach(ayat => {
            const highligtedTeks = applyIzhar(ayat.teksArab);
            
            container.innerHTML += `
                <div class="ayat-card">
                    <div style="color:var(--primary); font-size:12px; margin-bottom:15px;">SURAH ${json.data.namaLatin} : AYAT ${ayat.nomorAyat}</div>
                    <div class="teks-arab">${highligtedTeks}</div>
                </div>
            `;
        });
    }

    // Jam Update
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    // Jalankan (Contoh Surah ke-1, tinggal ganti angka untuk surah lain)
    loadSurah(1); 
</script>
</body>
</html>
