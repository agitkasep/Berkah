<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Berkah - Fast</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a86b; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #1e293b; }
        .nav-header { padding: 15px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
        .btn-back { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--primary); margin-right: 10px; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .ayat-card { background: white; margin-bottom: 12px; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        .teks-arab { font-family: 'Amiri', serif; font-size: 32px; text-align: right; line-height: 2.3; direction: rtl; }
        .teks-indo { font-size: 14px; color: #64748b; margin-top: 10px; }
        .loading-text { text-align: center; padding: 50px; color: #94a3b8; }
        /* Warna Tajwid */
        .ghn { color: #ff7e00; font-weight: bold; }
        .ikh { color: #ff0000; font-weight: bold; }
        .idg { color: #2196f3; }
        .qlq { color: #9c27b0; font-weight: bold; }
        .mad { color: #e91e63; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="nav-header"><b>Al-Qur'an Berkah</b></div>
        <div id="list-container" class="container"></div>
    </div>

    <div id="detail-surat" style="display:none;">
        <div class="nav-header">
            <button class="btn-back" onclick="backToList()">⬅️</button>
            <b id="judul-surat"></b>
        </div>
        <div id="ayat-container" class="container"></div>
    </div>

    <!-- Pindah ke bawah agar tidak menghambat loading -->
    <script src="https://cdn.jsdelivr.net/gh/alif-type/alif-tajwid@main/dist/alif-tajwid.min.js" async></script>

    <script>
        let isTajwidReady = false;
        window.onload = () => { isTajwidReady = typeof alifTajwid !== 'undefined'; };

        async function loadSurat() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<div class="loading-text">Membuka Mushaf...</div>';
            try {
                const res = await fetch('https://equran.id/api/v2/surat');
                const json = await res.json();
                container.innerHTML = json.data.map(s => `
                    <div style="background:white; padding:15px; border-radius:12px; margin-bottom:8px; border:1px solid #eee;" onclick="openSurat(${s.nomor})">
                        <b>${s.nomor}. ${s.namaLatin}</b>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "Gagal memuat."; }
        }

        async function openSurat(nomor) {
            const container = document.getElementById('ayat-container');
            document.getElementById('main-view').style.display = "none";
            document.getElementById('detail-surat').style.display = "block";
            container.innerHTML = '<div class="loading-text">Menyusun Ayat...</div>';

            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const json = await res.json();
                const s = json.data;
                document.getElementById('judul-surat').innerText = s.namaLatin;

                container.innerHTML = s.ayat.map(a => {
                    // Cek apakah library tajwid sudah siap, kalau belum pakai teks polos dulu
                    const teksArab = (typeof alifTajwid !== 'undefined') ? alifTajwid.render(a.teksArab) : a.teksArab;
                    return `
                        <div class="ayat-card">
                            <div class="teks-arab">${teksArab}</div>
                            <div class="teks-indo">${a.teksIndonesia}</div>
                        </div>
                    `;
                }).join('');
            } catch (e) { container.innerHTML = "Gagal mengambil data."; }
        }

        function backToList() {
            document.getElementById('main-view').style.display = "block";
            document.getElementById('detail-surat').style.display = "none";
        }

        loadSurat();
    </script>
</body>
</html>
