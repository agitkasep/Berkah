<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agit Studio - Universal Izhar Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a86b; 
            --bg-body: #ffffff;
            --bg-card: #1e1e1e;
            --izhar: #ffff00; 
        }
        body { background-color: var(--bg-body); color: #333; font-family: sans-serif; margin: 0; }
        .header { 
            background: var(--primary); padding: 15px; text-align: center; 
            border-bottom: 3px solid #008f5a; color: white; position: sticky; top: 0; z-index: 100;
        }
        #clock { font-size: 22px; font-weight: bold; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .btn-back {
            background: #444; color: white; border: none; padding: 10px 15px;
            border-radius: 8px; cursor: pointer; margin-bottom: 20px; display: none; font-weight: bold;
        }
        .list-surah { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .surah-item {
            background: #fdfdfd; border: 1px solid #ddd; padding: 15px;
            border-radius: 10px; cursor: pointer; text-align: center; transition: 0.2s;
        }
        .surah-item:hover { border-color: var(--primary); background: #f0fff0; }
        .ayat-card { 
            background-color: var(--bg-card); border-radius: 15px; 
            padding: 25px; margin-bottom: 20px; border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }
        .info-ayat { color: var(--primary); font-size: 12px; margin-bottom: 15px; font-weight: bold; }
        .teks-arab { 
            font-family: 'Amiri', serif; font-size: 34px; line-height: 2.8; 
            text-align: right; direction: rtl; color: white;
        }
        .izhar { 
            color: var(--izhar) !important; font-weight: bold;
            text-shadow: 0 0 8px rgba(255,255,0,0.6);
        }
        .loading { text-align: center; padding: 50px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <div id="clock">00:00:00</div>
    <div style="font-size: 10px; letter-spacing: 1px;">UNIVERSAL IZHAR PARSER PRO</div>
</div>

<div class="container">
    <button id="btnBack" class="btn-back" onclick="showList()">← DAFTAR SURAT</button>
    <div id="app">
        <div class="loading">Memuat...</div>
    </div>
</div>

<script>
    const IZHAR_RULES = {
        halqi: /([نًٌٍْ])\s*([أاھهحخعغ])/g,
        syafawi: /([مْ])\s*([^مب\s])/g,
        qomariyah: /(ال)\s*([أبجحخعغفقكموهي])/g
    };

    function applyIzhar(text) {
        if (!text) return "";
        let processed = text;
        processed = processed.replace(IZHAR_RULES.halqi, '<span class="izhar">$1</span> $2');
        processed = processed.replace(IZHAR_RULES.syafawi, '<span class="izhar">$1</span> $2');
        processed = processed.replace(IZHAR_RULES.qomariyah, '<span class="izhar">$1</span>$2');
        return processed;
    }

    async function showList() {
        document.getElementById('btnBack').style.display = 'none';
        const app = document.getElementById('app');
        app.innerHTML = '<div class="loading">Memuat Daftar Surat...</div>';
        try {
            const res = await fetch('https://equran.id/api/v2/surat');
            const json = await res.json();
            let html = '<div class="list-surah">';
            json.data.forEach(s => {
                html += `<div class="surah-item" onclick="loadSurah(${s.nomor})">
                            <strong>${s.nomor}. ${s.namaLatin}</strong>
                         </div>`;
            });
            html += '</div>';
            app.innerHTML = html;
        } catch (e) { app.innerHTML = 'Error koneksi.'; }
    }

    async function loadSurah(n) {
        document.getElementById('btnBack').style.display = 'block';
        const app = document.getElementById('app');
        app.innerHTML = '<div class="loading">Menganalisis Tajwid...</div>';
        window.scrollTo(0,0);
        try {
            const res = await fetch(`https://equran.id/api/v2/surat/${n}`);
            const json = await res.json();
            app.innerHTML = '';
            json.data.ayat.forEach(a => {
                app.innerHTML += `
                    <div class="ayat-card">
                        <div class="info-ayat">SURAH ${json.data.namaLatin} : AYAT ${a.nomorAyat}</div>
                        <div class="teks-arab">${applyIzhar(a.teksArab)}</div>
                    </div>`;
            });
        } catch (e) { app.innerHTML = 'Gagal memuat.'; }
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    showList();
</script>
</body>
</html>
