<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a86b; 
            --ghunnah: #ff7e00; --ikhfa: #ff0000; --idgham: #2196f3;
            --iqlab: #4caf50; --qolqolah: #9c27b0; --mad: #e91e63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #1e293b; }
        .nav-header { padding: 15px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
        .btn-back { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--primary); margin-right: 10px; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        
        .audio-card { background: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #eee; }
        .ayat-card { background: white; margin-bottom: 12px; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        
        .teks-arab { font-family: 'Amiri', serif; font-size: 32px; text-align: right; line-height: 2.3; direction: rtl; }
        .teks-latin { font-size: 14px; color: var(--primary); font-style: italic; margin-top: 10px; margin-bottom: 5px; }
        .teks-indo { font-size: 14px; color: #64748b; }
        
        /* Tajwid Colors */
        .ghn { color: var(--ghunnah) !important; font-weight: bold; }
        .ikh { color: var(--ikhfa) !important; font-weight: bold; }
        .idg { color: var(--idgham) !important; }
        .iql { color: var(--iqlab) !important; font-weight: bold; }
        .qlq { color: var(--qolqolah) !important; font-weight: bold; }
        .mad { color: var(--mad) !important; }

        .btn-download { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--primary); background: white; color: var(--primary); font-weight: 700; margin-top: 10px; cursor: pointer; }
        .btn-download.saved { background: var(--primary); color: white; }
        .loading-text { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="nav-header"><b>Al-Qur'an Berkah</b></div>
        <div id="list-container" class="container"></div>
    </div>

    <div id="detail-surat" style="display:none;">
        <div class="nav-header">
            <button class="btn-back" onclick="backToList()">⬅️</button>
            <b id="judul-surat"></b>
        </div>
        <div id="ayat-container" class="container"></div>
    </div>

    <!-- Library Tajwid (Wajib dimuat agar warna muncul) -->
    <script src="https://cdn.jsdelivr.net/gh/alif-type/alif-tajwid@main/dist/alif-tajwid.min.js"></script>

    <script>
        const CACHE_NAME = 'berkah-quran-v1';

        async function loadSurat() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<div class="loading-text">Memuat Daftar Surat...</div>';
            try {
                const res = await fetch('https://equran.id/api/v2/surat');
                const json = await res.json();
                container.innerHTML = json.data.map(s => `
                    <div style="background:white; padding:15px; border-radius:12px; margin-bottom:8px; border:1px solid #eee; display:flex; justify-content:space-between; align-items:center;" onclick="openSurat(${s.nomor})">
                        <div><b>${s.nomor}. ${s.namaLatin}</b><br><small>${s.arti}</small></div>
                        <div style="font-family:'Amiri'; font-size:20px; color:var(--primary);">${s.nama}</div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "Gagal memuat."; }
        }

        async function openSurat(nomor) {
            const container = document.getElementById('ayat-container');
            document.getElementById('main-view').style.display = "none";
            document.getElementById('detail-surat').style.display = "block";
            container.innerHTML = '<div class="loading-text">Menyusun Tajwid & Audio...</div>';
            window.scrollTo(0,0);

            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const json = await res.json();
                const s = json.data;
                document.getElementById('judul-surat').innerText = s.namaLatin;

                const isSaved = await checkCache(s.audioFull['05']);

                let html = `
                    <div class="audio-card">
                        <audio controls style="width:100%"><source src="${s.audioFull['05']}" type="audio/mpeg"></audio>
                        <button id="dl-btn" class="btn-download ${isSaved ? 'saved' : ''}" onclick="downloadAudio('${s.audioFull['05']}')">
                            ${isSaved ? '✅ Tersimpan Offline' : '📥 Download Audio Surat'}
                        </button>
                    </div>
                `;

                html += s.ayat.map(a => {
                    // Proses Warna Tajwid
                    const teksTajwid = alifTajwid.render(a.teksArab);
                    return `
                        <div class="ayat-card">
                            <div style="font-size:12px; color:var(--primary); margin-bottom:10px; font-weight:700;">AYAT ${a.nomorAyat}</div>
                            <div class="teks-arab">${teksTajwid}</div>
                            <div class="teks-latin">${a.teksLatin}</div>
                            <div class="teks-indo">${a.teksIndonesia}</div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = html;
            } catch (e) { container.innerHTML = "Gagal memuat ayat."; }
        }

        async function downloadAudio(url) {
            const btn = document.getElementById('dl-btn');
            btn.innerText = "⚡ Mengunduh...";
            try {
                const cache = await caches.open(CACHE_NAME);
                await cache.add(url);
                btn.innerText = "✅ Tersimpan Offline";
                btn.classList.add('saved');
            } catch (e) { alert("Gagal mendownload audio."); }
        }

        async function checkCache(url) {
            try {
                const cache = await caches.open(CACHE_NAME);
                const res = await cache.match(url);
                return !!res;
            } catch (e) { return false; }
        }

        function backToList() {
            document.getElementById('main-view').style.display = "block";
            document.getElementById('detail-surat').style.display = "none";
        }

        loadSurat();
    </script>
</body>
</html>
