<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Berkah - Fast Loading</title>
    <link rel="preconnect" href="https://equran.id">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00a86b;
            --ghunnah: #ff7e00; --ikhfa: #ff0000; --idgham: #2196f3;
            --iqlab: #4caf50; --qolqolah: #9c27b0; --mad: #e91e63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; color: #1e293b; }
        .nav-header { display: flex; align-items: center; padding: 15px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .btn-back { border: none; background: none; font-size: 20px; color: var(--primary); cursor: pointer; margin-right: 10px; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .audio-card { background: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #eee; }
        .ayat-card { background: white; margin-bottom: 10px; padding: 20px; border-radius: 15px; border: 1px solid #eee; }
        .teks-arab { font-family: 'Amiri', serif; font-size: 30px; text-align: right; line-height: 2.2; direction: rtl; margin-bottom: 15px; }
        /* Tajwid Colors */
        .ghn { color: var(--ghunnah); font-weight: bold; }
        .ikh { color: var(--ikhfa); font-weight: bold; }
        .idg { color: var(--idgham); }
        .qlq { color: var(--qolqolah); font-weight: bold; }
        .mad { color: var(--mad); }
        
        .loading-spinner { display: flex; justify-content: center; align-items: center; height: 200px; color: #94a3b8; font-size: 14px; }
        .btn-download { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--primary); background: white; color: var(--primary); font-weight: 700; margin-top: 10px; cursor: pointer; }
        .btn-download.saved { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="nav-header"><div style="font-weight:700;">Al-Qur'an Berkah</div></div>
        <div id="list-container" class="container"></div>
    </div>

    <div id="detail-surat" style="display:none;">
        <div class="nav-header">
            <button class="btn-back" onclick="backToList()">⬅️</button>
            <div id="judul-surat" style="font-weight:700;"></div>
        </div>
        <div id="ayat-container" class="container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/alif-type/alif-tajwid@main/dist/alif-tajwid.min.js"></script>

    <script>
        const CACHE_NAME = 'berkah-v2';
        let suratStorage = {}; // RAM Cache agar loading instan saat balik lagi

        // Load Daftar Surat
        async function loadSurat() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<div class="loading-spinner">Membuka Mushaf...</div>';
            try {
                const res = await fetch('https://equran.id/api/v2/surat');
                const json = await res.json();
                container.innerHTML = json.data.map(s => `
                    <div style="background:white; padding:15px; border-radius:12px; margin-bottom:8px; display:flex; justify-content:space-between; border:1px solid #eee;" onclick="openSurat(${s.nomor})">
                        <div><b>${s.nomor}. ${s.namaLatin}</b><br><small>${s.arti}</small></div>
                        <div style="font-family:'Amiri'; font-size:20px; color:var(--primary);">${s.nama}</div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "Gagal memuat."; }
        }

        async function openSurat(nomor) {
            const container = document.getElementById('ayat-container');
            document.getElementById('main-view').style.display = "none";
            document.getElementById('detail-surat').style.display = "block";
            window.scrollTo(0,0);

            // Jika sudah pernah dibuka, ambil dari RAM (Instan!)
            if (suratStorage[nomor]) {
                renderAyat(suratStorage[nomor]);
                return;
            }

            container.innerHTML = '<div class="loading-spinner">Menyiapkan Ayat...</div>';

            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const json = await res.json();
                suratStorage[nomor] = json.data;
                renderAyat(json.data);
            } catch (e) { container.innerHTML = "Koneksi terputus."; }
        }

        async function renderAyat(s) {
            document.getElementById('judul-surat').innerText = s.namaLatin;
            const container = document.getElementById('ayat-container');
            const isSaved = await checkCache(s.audioFull['05']);

            let html = `
                <div class="audio-card">
                    <audio id="player" controls style="width:100%"><source src="${s.audioFull['05']}"></audio>
                    <button id="dl-btn" class="btn-download ${isSaved ? 'saved' : ''}" onclick="downloadAudio('${s.audioFull['05']}')">
                        ${isSaved ? '✅ Tersimpan Offline' : '📥 Download Surat'}
                    </button>
                </div>
            `;

            // Batch Rendering untuk performa
            html += s.ayat.map(a => `
                <div class="ayat-card">
                    <div style="font-size:12px; color:var(--primary); margin-bottom:10px;">AYAT ${a.nomorAyat}</div>
                    <div class="teks-arab">${alifTajwid.render(a.teksArab)}</div>
                    <div style="font-size:13px; color:#64748b; margin-top:10px;">${a.teksIndonesia}</div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        async function downloadAudio(url) {
            const btn = document.getElementById('dl-btn');
            btn.innerText = "⚡ Mendownload...";
            try {
                const cache = await caches.open(CACHE_NAME);
                await cache.add(url);
                btn.innerText = "✅ Tersimpan Offline";
                btn.classList.add('saved');
            } catch (e) { btn.innerText = "❌ Gagal Simpan"; }
        }

        async function checkCache(url) {
            const cache = await caches.open(CACHE_NAME);
            const res = await cache.match(url);
            return !!res;
        }

        function backToList() {
            document.getElementById('main-view').style.display = "block";
            document.getElementById('detail-surat').style.display = "none";
        }

        loadSurat();
    </script>
</body>
</html>
