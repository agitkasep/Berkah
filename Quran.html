<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Tajwid Pro - Agit Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a86b; --bg: #f4f7f6;
            --mad: #2196f3; --ghn: #ff9800; --idg: #f44336;
            --ikh: #9c27b0; --iql: #4caf50; --qlq: #795548;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; }
        
        .header { 
            background: var(--primary); color: white; padding: 15px; 
            text-align: center; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 1000;
        }
        #clock { font-size: 24px; font-weight: bold; }

        .container { padding: 15px; }
        .ayat-card { 
            background: white; border-radius: 15px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .teks-arab { 
            font-family: 'Amiri', serif; font-size: 32px; line-height: 2.5; 
            text-align: right; direction: rtl; 
        }

        /* Warna Tajwid Berdasarkan Class */
        .tajwid-mad { color: var(--mad); }
        .tajwid-ghunnah { color: var(--ghn); font-weight: bold; }
        .tajwid-idgham { color: var(--idg); font-weight: bold; }
        .tajwid-ikhfa { color: var(--ikh); font-weight: bold; }
        .tajwid-iqlab { color: var(--iql); font-weight: bold; }
        .tajwid-qolqolah { color: var(--qlq); border-bottom: 2px solid var(--qlq); }

        .loading { text-align: center; padding: 50px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock">00:00:00</div>
        <div style="font-size: 11px; opacity: 0.9;">AUTO-MAPPING TAJWID ENGINE</div>
    </div>

    <div class="container" id="app">
        <div class="loading">Menyusun Database Tajwid...</div>
    </div>

    <script>
        // Jam Realtime
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);

        async function loadQuran() {
            const app = document.getElementById('app');
            try {
                // Mengambil data dari API yang sudah memiliki klasifikasi tajwid
                const res = await fetch('https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=1');
                const data = await res.json();
                
                app.innerHTML = '';
                data.verses.forEach(verse => {
                    // Logika Smart Parser: 
                    // Karena kita tidak punya file JSON manual, kita gunakan parser 
                    // yang mendeteksi pola tajwid langsung pada string Uthmani.
                    const coloredText = parseTajwid(verse.text_uthmani);
                    
                    app.innerHTML += `
                        <div class="ayat-card">
                            <div style="font-size: 12px; color: var(--primary); font-weight: bold; margin-bottom: 10px;">AYAT ${verse.verse_key.split(':')[1]}</div>
                            <div class="teks-arab">${coloredText}</div>
                        </div>
                    `;
                });
            } catch (e) {
                app.innerHTML = '<div class="loading">Gagal memuat data.</div>';
            }
        }

        function parseTajwid(text) {
            // Parser ini menggunakan pola karakter untuk membungkus hukum tajwid
            return text
                // Ghunnah
                .replace(/([نّمّ]ّ)/g, '<span class="tajwid-ghunnah">$1</span>')
                // Qolqolah
                .replace(/([بجدهق][ْ])/g, '<span class="tajwid-qolqolah">$1</span>')
                // Mad & Harakat Panjang
                .replace(/([~ٰ]|([َاِيُو]ْ?[اىو]))/g, '<span class="tajwid-mad">$1</span>')
                // Iqlab
                .replace(/([ۭۢ])/g, '<span class="tajwid-iqlab">$1</span>');
        }

        loadQuran();
    </script>
</body>
</html>
