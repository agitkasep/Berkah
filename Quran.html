<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agit Studio - Quran Tajwid Mapper</title>
    <style>
        :root {
            --bg: #f4f7f6; --primary: #00a86b;
            --c-mad: #2196f3; --c-ghn: #ff9800; --c-idg: #f44336;
            --c-ikh: #9c27b0; --c-iql: #4caf50; --c-qlq: #795548;
        }
        body { background: var(--bg); font-family: sans-serif; margin: 0; }
        .header { background: var(--primary); color: white; padding: 10px; text-align: center; border-radius: 0 0 20px 20px; }
        
        /* CSS Tajwid yang dipanggil oleh JSON Mapper */
        .mad { color: var(--c-mad); font-weight: bold; }
        .ghn { color: var(--c-ghn); text-decoration: underline; }
        .idg { color: var(--c-idg); font-weight: bold; }
        .ikh { color: var(--c-ikh); font-weight: bold; }
        .iql { color: var(--c-iql); border: 1px solid var(--c-iql); border-radius: 3px; }
        .qlq { color: var(--c-qlq); font-style: italic; }

        .ayat-box { background: white; margin: 10px; padding: 20px; border-radius: 15px; border: 1px solid #ddd; }
        .teks-arab { font-size: 30px; line-height: 2.5; text-align: right; direction: rtl; font-family: 'Amiri', serif; }
    </style>
</head>
<body>

    <div class="header">
        <div id="clock" style="font-size: 20px; font-weight: bold;">00:00:00</div>
        <div style="font-size: 10px;">DATA TAJWID MAPPER (JSON)</div>
    </div>

    <div id="app">
        <!-- Hasil Mapping Muncul Di Sini -->
    </div>

    <script>
        // 1. CONTOH DATA JSON TAJWID (Simulasi hasil fetch dari Database Kemenag/LPMQ)
        const quranData = [
            {
                ayat: 1,
                arab: "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ",
                map: [
                    { start: 5, end: 9, hukum: "mad" },    // Allah
                    { start: 14, end: 18, hukum: "mad" },  // Rahman
                    { start: 23, end: 27, hukum: "mad" }   // Rahim
                ]
            },
            {
                ayat: 2,
                arab: "الْحَمْدُ لِلَّهِ رَبِّ الْعَالَمِينَ",
                map: [
                    { start: 10, end: 13, hukum: "mad" },
                    { start: 20, end: 24, hukum: "mad" }
                ]
            }
        ];

        // 2. FUNGSI MAPPER (Merubah JSON menjadi HTML Berwarna)
        function renderTajwidJSON(text, mapping) {
            let charArray = Array.from(text);
            
            // Kita bungkus tiap karakter yang masuk dalam koordinat
            mapping.forEach(rule => {
                for (let i = rule.start; i <= rule.end; i++) {
                    if (charArray[i]) {
                        charArray[i] = `<span class="${rule.hukum}">${charArray[i]}</span>`;
                    }
                }
            });
            
            return charArray.join('');
        }

        // 3. Eksekusi ke Layar
        const app = document.getElementById('app');
        quranData.forEach(item => {
            const result = renderTajwidJSON(item.arab, item.map);
            app.innerHTML += `
                <div class="ayat-box">
                    <div style="font-size:12px; color:gray;">Ayat ${item.ayat}</div>
                    <div class="teks-arab">${result}</div>
                </div>
            `;
        });

        // Jam Realtime
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);
    </script>
</body>
</html>
