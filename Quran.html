<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a86b; --bg: #f4f7f6;
            --ghunnah: #ff7e00; --ikhfa: #ff0000; --idgham: #2196f3;
            --iqlab: #4caf50; --qolqolah: #9c27b0; --mad: #e91e63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #1e293b; }
        
        .header-top { padding: 20px; background: var(--primary); color: white; border-radius: 0 0 25px 25px; text-align: center; margin-bottom: 10px; }
        #clock { font-size: 32px; font-weight: 700; }
        #date { font-size: 14px; opacity: 0.9; }

        .nav-header { padding: 15px 20px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
        .btn-back { font-size: 20px; margin-right: 15px; color: var(--primary); cursor: pointer; border:none; background:none; }
        
        .search-container { padding: 10px 20px; }
        .search-input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; background: white; }
        
        .surat-item { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; border: 1px solid #f1f5f9; }
        .nama-arab { font-family: 'Amiri', serif; font-size: 22px; color: var(--primary); font-weight: 700; }

        .asbab-box { background: #fffbeb; border: 1px solid #fde68a; padding: 15px; border-radius: 12px; margin: 15px; font-size: 13px; color: #92400e; line-height: 1.5; }
        .ayat-item { padding: 25px 20px; border-bottom: 1px solid #eee; background: white; }
        .teks-arab { font-family: 'Amiri', serif; font-size: 32px; text-align: right; line-height: 2.5; direction: rtl; }
        
        /* Tajwid CSS Classes (Wajib Ada) */
        .ghn { color: var(--ghunnah) !important; font-weight: bold; }
        .ikh { color: var(--ikhfa) !important; font-weight: bold; }
        .idg { color: var(--idgham) !important; }
        .iql { color: var(--iqlab) !important; font-weight: bold; }
        .qlq { color: var(--qolqolah) !important; font-weight: bold; }
        .mad { color: var(--mad) !important; }

        .teks-latin { font-size: 14px; color: var(--primary); font-style: italic; margin: 10px 0; font-weight: 500; }
        .teks-indo { font-size: 14px; color: #475569; line-height: 1.6; }
        .loading { text-align: center; padding: 50px; color: #64748b; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header-top">
            <div id="clock">00:00:00</div>
            <div id="date">Memuat...</div>
        </div>
        <div class="search-container"><input type="text" id="searchSurat" class="search-input" placeholder="Cari surat..." onkeyup="filterSurat()"></div>
        <div id="list-container" style="padding: 10px 20px;"></div>
    </div>

    <div id="detail-surat" style="display:none;">
        <div class="nav-header">
            <button class="btn-back" onclick="backToList()">⬅️</button>
            <b id="judul-surat"></b>
        </div>
        <div id="asbab-container"></div>
        <div id="ayat-container"></div>
    </div>

    <!-- Script Tajwid Harus Dimuat Sebelum Fungsi Dipanggil -->
    <script src="https://cdn.jsdelivr.net/gh/alif-type/alif-tajwid@main/dist/alif-tajwid.min.js"></script>

    <script>
        let dataSurat = [];

        // Jam Realtime
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateClock, 1000); updateClock();

        // Load List
        async function getDaftarSurat() {
            const res = await fetch('https://quran-api-id.vercel.app/surah');
            dataSurat = await res.json();
            renderSurat(dataSurat);
        }

        function renderSurat(list) {
            const container = document.getElementById('list-container');
            container.innerHTML = list.map(s => `
                <div class="surat-item" onclick="getDetailSurat(${s.number})">
                    <div style="display:flex; align-items:center;">
                        <div style="font-weight:700; margin-right:15px; color:var(--primary)">${s.number}</div>
                        <div><b>${s.name}</b><br><small>${s.translation}</small></div>
                    </div>
                    <div class="nama-arab">${s.asm}</div>
                </div>
            `).join('');
        }

        function filterSurat() {
            const q = document.getElementById('searchSurat').value.toLowerCase();
            renderSurat(dataSurat.filter(s => s.name.toLowerCase().includes(q)));
        }

        // Load Detail (Mashup Tajwid & Asbab)
        async function getDetailSurat(nomor) {
            document.getElementById('main-view').style.display = "none";
            document.getElementById('detail-surat').style.display = "block";
            const ayatCont = document.getElementById('ayat-container');
            const asbabCont = document.getElementById('asbab-container');
            
            ayatCont.innerHTML = '<div class="loading">Memuat Ayat & Tajwid...</div>';
            asbabCont.innerHTML = '';
            window.scrollTo(0,0);

            try {
                // Ambil Data Surat & Asbabun Nuzul secara bersamaan
                const [resSurat, resAsbab] = await Promise.all([
                    fetch(`https://quran-api-id.vercel.app/surah/${nomor}`),
                    fetch(`https://quran-api-id.vercel.app/surah/${nomor}`) // API ini juga punya field info/asbab
                ]);

                const s = await resSurat.json();
                document.getElementById('judul-surat').innerText = s.name;

                // Tampilkan Info/Asbabun Nuzul jika tersedia
                if(s.description) {
                    asbabCont.innerHTML = `<div class="asbab-box"><b>Info & Asbabun Nuzul:</b><br>${s.description}</div>`;
                }

                let html = `<div style="padding:20px; text-align:center; background:white; margin-bottom:10px;">
                    <audio controls style="width:100%"><source src="https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${nomor}.mp3" type="audio/mpeg"></audio>
                </div>`;

                s.ayaths.forEach(a => {
                    // Logika Tajwid: Render warna jika library siap
                    let teksTajwid = a.ar;
                    if (window.alifTajwid) {
                        teksTajwid = alifTajwid.render(a.ar);
                    }

                    html += `
                        <div class="ayat-item">
                            <div style="color:var(--primary); font-weight:700; font-size:12px; margin-bottom:10px;">AYAT ${a.number}</div>
                            <div class="teks-arab">${teksTajwid}</div>
                            <div class="teks-latin">${a.tr}</div>
                            <div class="teks-indo">${a.id}</div>
                        </div>
                    `;
                });
                ayatCont.innerHTML = html;
            } catch (e) {
                ayatCont.innerHTML = "<div class='loading'>Gagal memuat data.</div>";
            }
        }

        function backToList() {
            document.getElementById('main-view').style.display = "block";
            document.getElementById('detail-surat').style.display = "none";
        }

        getDaftarSurat();
    </script>
</body>
</html>
