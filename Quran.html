<style>
    :root { 
        --primary: #00a86b; 
        --bg: #ffffff; /* Berubah jadi Putih */
        --card-bg: #1e1e1e; /* Warna gelap tetap untuk box ayat */
        --izhar: #ffff00; 
    }
    
    body { 
        background: var(--bg); 
        color: #333; /* Font utama di luar box jadi gelap */
        font-family: sans-serif; 
        margin: 0; 
    }

    .header { 
        background: var(--primary); 
        padding: 15px; 
        text-align: center; 
        border-bottom: 3px solid #008f5a; 
        color: white; /* Tulisan di header tetap putih */
    }

    #clock { font-size: 22px; font-weight: bold; }
    
    .container { padding: 20px; }

    /* Box Ayat tetap Hitam */
    .ayat-card { 
        background: var(--card-bg); 
        color: white; /* Tulisan di dalam box tetap putih */
        border-radius: 15px; 
        padding: 25px; 
        margin-bottom: 20px; 
        border: 1px solid #ddd; /* Border tipis agar terlihat di bg putih */
        box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Tambah shadow biar elegan */
    }

    .teks-arab { 
        font-family: 'Amiri', serif; 
        font-size: 34px; 
        line-height: 2.8; 
        text-align: right; 
        direction: rtl; 
        word-spacing: 8px;
    }

    .izhar { 
        color: var(--izhar) !important; 
        font-weight: bold;
        text-shadow: 0 0 5px rgba(255,255,0,0.5);
    }
</style>
