<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a86b; --bg: #f4f7f6;
            --ghunnah: #ff7e00; --ikhfa: #ff0000; --idgham: #2196f3;
            --iqlab: #4caf50; --qolqolah: #9c27b0; --mad: #e91e63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #1e293b; }
        
        /* Jam Lebih Kecil & Proporsional */
        .header-top { 
            padding: 12px; background: var(--primary); color: white; 
            border-radius: 0 0 20px 20px; text-align: center; margin-bottom: 5px;
        }
        #clock { font-size: 24px; font-weight: 700; line-height: 1.2; }
        #date { font-size: 12px; opacity: 0.9; }

        .nav-header { padding: 15px 20px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
        .btn-back { font-size: 20px; margin-right: 15px; color: var(--primary); cursor: pointer; border:none; background:none; }
        
        .search-container { padding: 10px 20px; }
        .search-input { width: 100%; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; background: white; font-size: 14px; }
        
        .surat-list { padding: 10px 20px; }
        .surat-item { background: white; padding: 12px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; border: 1px solid #f1f5f9; }
        .nomor-badge { width: 30px; height: 30px; background: #f0fff4; color: var(--primary); display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 700; font-size: 12px; margin-right: 12px; }
        .nama-arab { font-family: 'Amiri', serif; font-size: 20px; color: var(--primary); font-weight: 700; }

        /* Detail & Tajwid */
        .asbab-box { background: #fffbeb; border: 1px solid #fde68a; padding: 15px; border-radius: 12px; margin: 15px; font-size: 13px; color: #92400e; line-height: 1.5; }
        .ayat-item { padding: 25px 20px; border-bottom: 1px solid #eee; background: white; }
        .teks-arab { font-family: 'Amiri', serif; font-size: 32px; text-align: right; line-height: 2.5; direction: rtl; }
        
        .ghn { color: var(--ghunnah) !important; font-weight: bold; }
        .ikh { color: var(--ikhfa) !important; font-weight: bold; }
        .idg { color: var(--idgham) !important; }
        .iql { color: var(--iqlab) !important; font-weight: bold; }
        .qlq { color: var(--qolqolah) !important; font-weight: bold; }
        .mad { color: var(--mad) !important; }

        .teks-latin { font-size: 14px; color: var(--primary); font-style: italic; margin: 10px 0; }
        .teks-indo { font-size: 14px; color: #475569; line-height: 1.6; }
        .loading { text-align: center; padding: 50px; color: #64748b; font-size: 14px; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header-top">
            <div id="clock">00:00:00</div>
            <div id="date">Memuat...</div>
        </div>
        <div class="search-container">
            <input type="text" id="searchSurat" class="search-input" placeholder="Cari surat..." onkeyup="filterSurat()">
        </div>
        <div id="list-container" class="surat-list">
            <div class="loading">Memuat daftar surat...</div>
        </div>
    </div>

    <div id="detail-surat" style="display:none;">
        <div class="nav-header">
            <button class="btn-back" onclick="backToList()">⬅️</button>
            <b id="judul-surat"></b>
        </div>
        <div id="asbab-container"></div>
        <div id="ayat-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/alif-type/alif-tajwid@main/dist/alif-tajwid.min.js"></script>

    <script>
        let dataSurat = [];

        // Jam & Tanggal Realtime (Sesuai Waktu East Jakarta)
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds}`;
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', options);
        }
        setInterval(updateClock, 1000); updateClock();

        // Ambil Daftar Surat (Memperbaiki Bug Nama Surat Hilang)
        async function getDaftarSurat() {
            const container = document.getElementById('list-container');
            try {
                const res = await fetch('https://equran.id/api/v2/surat');
                const json = await res.json();
                dataSurat = json.data;
                renderSurat(dataSurat);
            } catch (e) {
                container.innerHTML = "<div class='loading'>Gagal memuat daftar. Periksa internet.</div>";
            }
        }

        function renderSurat(list) {
            const container = document.getElementById('list-container');
            if (list.length === 0) {
                container.innerHTML = "<div class='loading'>Surat tidak ditemukan.</div>";
                return;
            }
            container.innerHTML = list.map(s => `
                <div class="surat-item" onclick="getDetailSurat(${s.nomor})">
                    <div style="display:flex; align-items:center;">
                        <div class="nomor-badge">${s.nomor}</div>
                        <div>
                            <div style="font-weight:700; font-size:14px;">${s.namaLatin}</div>
                            <div style="font-size:11px; color:gray;">${s.arti} • ${s.jumlahAyat} Ayat</div>
                        </div>
                    </div>
                    <div class="nama-arab">${s.nama}</div>
                </div>
            `).join('');
        }

        function filterSurat() {
            const q = document.getElementById('searchSurat').value.toLowerCase();
            const filtered = dataSurat.filter(s => s.namaLatin.toLowerCase().includes(q));
            renderSurat(filtered);
        }

        // Ambil Detail Ayat & Tajwid & Asbab
        async function getDetailSurat(nomor) {
            document.getElementById('main-view').style.display = "none";
            document.getElementById('detail-surat').style.display = "block";
            const ayatCont = document.getElementById('ayat-container');
            const asbabCont = document.getElementById('asbab-container');
            
            ayatCont.innerHTML = '<div class="loading">Memuat Ayat & Tajwid...</div>';
            asbabCont.innerHTML = '';
            window.scrollTo(0,0);

            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const json = await res.json();
                const s = json.data;
                
                document.getElementById('judul-surat').innerText = s.namaLatin;

                // Tampilkan Deskripsi/Asbabun Nuzul
                if(s.deskripsi) {
                    asbabCont.innerHTML = `<div class="asbab-box"><b>Info Surat:</b><br>${s.deskripsi}</div>`;
                }

                let html = `<div style="padding:15px; text-align:center; background:white; margin-bottom:5px;">
                    <audio controls style="width:100%; height:40px;"><source src="${s.audioFull['05']}" type="audio/mpeg"></audio>
                </div>`;

                s.ayat.forEach(a => {
                    let teksTajwid = a.teksArab;
                    if (window.alifTajwid) {
                        teksTajwid = alifTajwid.render(a.teksArab);
                    }

                    html += `
                        <div class="ayat-item">
                            <div style="color:var(--primary); font-weight:700; font-size:12px; margin-bottom:10px;">AYAT ${a.nomorAyat}</div>
                            <div class="teks-arab">${teksTajwid}</div>
                            <div class="teks-latin">${a.teksLatin}</div>
                            <div class="teks-indo">${a.teksIndonesia}</div>
                        </div>
                    `;
                });
                ayatCont.innerHTML = html;
            } catch (e) {
                ayatCont.innerHTML = "<div class='loading'>Gagal memuat ayat.</div>";
            }
        }

        function backToList() {
            document.getElementById('main-view').style.display = "block";
            document.getElementById('detail-surat').style.display = "none";
        }

        getDaftarSurat();
    </script>
</body>
</html>
