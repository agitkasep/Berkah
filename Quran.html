<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Berkah - Mashup System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a86b; --ghunnah: #ff7e00; --ikhfa: #ff0000; --idgham: #2196f3; --qlq: #9c27b0; --mad: #e91e63; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #1e293b; }
        .nav-header { padding: 15px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
        .btn-back { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--primary); margin-right: 10px; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .audio-card { background: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #eee; }
        .ayat-card { background: white; margin-bottom: 15px; padding: 25px 20px; border-radius: 18px; border: 1px solid #e2e8f0; }
        .teks-arab { font-family: 'Amiri', serif; font-size: 30px; text-align: right; line-height: 2.5; direction: rtl; margin-bottom: 15px; }
        .teks-latin { font-size: 14px; color: var(--primary); font-style: italic; margin-bottom: 8px; }
        .teks-indo { font-size: 14px; color: #475569; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .loading-text { text-align: center; padding: 50px; color: #94a3b8; }
        /* Tajwid Colors */
        .ghn { color: var(--ghunnah) !important; font-weight: bold; }
        .ikh { color: var(--ikhfa) !important; font-weight: bold; }
        .idg { color: var(--idgham) !important; }
        .qlq { color: var(--qlq) !important; font-weight: bold; }
        .mad { color: var(--mad) !important; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="nav-header"><b>Al-Qur'an Berkah</b></div>
        <div id="list-container" class="container"></div>
    </div>

    <div id="detail-surat" style="display:none;">
        <div class="nav-header">
            <button class="btn-back" onclick="backToList()">⬅️</button>
            <b id="judul-surat"></b>
        </div>
        <div id="ayat-container" class="container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/alif-type/alif-tajwid@main/dist/alif-tajwid.min.js"></script>

    <script>
        // Load Daftar Surat (Situs A)
        async function loadSurat() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<div class="loading-text">Memuat Daftar Surat...</div>';
            try {
                const res = await fetch('https://equran.id/api/v2/surat');
                const json = await res.json();
                container.innerHTML = json.data.map(s => `
                    <div style="background:white; padding:15px; border-radius:12px; margin-bottom:8px; border:1px solid #eee; display:flex; justify-content:space-between; align-items:center;" onclick="openSurat(${s.nomor}, '${s.namaLatin}')">
                        <div><b>${s.nomor}. ${s.namaLatin}</b><br><small>${s.arti}</small></div>
                        <div style="font-family:'Amiri'; font-size:20px; color:var(--primary);">${s.nama}</div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "Gagal memuat."; }
        }

        async function openSurat(nomor, nama) {
            const container = document.getElementById('ayat-container');
            document.getElementById('main-view').style.display = "none";
            document.getElementById('detail-surat').style.display = "block";
            document.getElementById('judul-surat').innerText = nama;
            container.innerHTML = '<div class="loading-text">Merakit Ayat dari Berbagai Sumber...</div>';
            window.scrollTo(0,0);

            try {
                // AMBIL DATA SECARA BERTAHAP (Sequential) UNTUK MENGHINDARI BLOKIR
                // 1. Ambil Arab, Latin, Terjemahan (Situs B)
                const resB = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const dataB = await resB.json();
                const ayatList = dataB.data.ayat;

                // 2. Audio (Situs C) - Langsung tembak URL CDN
                const audioUrl = `https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${nomor}.mp3`;

                // 3. Render ke HTML
                let html = `
                    <div class="audio-card">
                        <audio controls style="width:100%"><source src="${audioUrl}" type="audio/mpeg"></audio>
                        <p style="font-size:10px; color:gray; margin-top:5px;">Audio: Mishary Rashid</p>
                    </div>
                `;

                html += ayatList.map(a => {
                    // 4. Tajwid (Situs D - Library Lokal)
                    // Kita pakai teksArab dari equran.id dan diwarnai otomatis
                    const tajwidHtml = alifTajwid.render(a.teksArab);

                    return `
                        <div class="ayat-card">
                            <div style="font-size:11px; color:var(--primary); margin-bottom:10px; font-weight:700;">AYAT ${a.nomorAyat}</div>
                            <div class="teks-arab">${tajwidHtml}</div>
                            <div class="teks-latin">${a.teksLatin}</div>
                            <div class="teks-indo">${a.teksIndonesia}</div>
                        </div>
                    `;
                }).join('');

                container.innerHTML = html;
            } catch (e) {
                console.error(e);
                container.innerHTML = "<div class='loading-text'>Gagal merakit data. Cek koneksi atau coba lagi nanti.</div>";
            }
        }

        function backToList() {
            document.getElementById('main-view').style.display = "block";
            document.getElementById('detail-surat').style.display = "none";
        }

        loadSurat();
    </script>
</body>
</html>
