<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BERKAH TAJWID V4.3 - Fixed Qolqolah</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a86b; 
            --bg-body: #ffffff; 
            --bg-card: #1a1a1a;
            --izhar: #ffff00;       
            --bighunnah: #00d4ff;   
            --bilaghunnah: #32ff7e; 
            --ikhfa: #ff00ff;       
            --qolqolah: #ff9800;    
        }
        
        body { background: var(--bg-body); color: #333; font-family: sans-serif; margin: 0; }
        .header { background: var(--primary); padding: 15px; text-align: center; color: white; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid #008f5a; }
        #clock { font-size: 20px; font-weight: bold; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        
        .btn-back { background: #444; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 15px; display: none; width: 100%; font-weight: bold; }

        .ayat-card { background: var(--bg-card); border-radius: 12px; padding: 25px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .info-ayat { color: var(--primary); font-size: 11px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .teks-arab { font-family: 'Amiri', serif; font-size: 34px; line-height: 2.8; text-align: right; direction: rtl; color: #ffffff; }

        /* Style Tajwid dengan Border agar makin jelas di HP */
        .izhar { color: var(--izhar) !important; border-bottom: 2px solid var(--izhar); }
        .bighunnah { color: var(--bighunnah) !important; border-bottom: 2px solid var(--bighunnah); }
        .bilaghunnah { color: var(--bilaghunnah) !important; border-bottom: 2px solid var(--bilaghunnah); }
        .ikhfa { color: var(--ikhfa) !important; border-bottom: 2px solid var(--ikhfa); }
        .qolqolah { color: var(--qolqolah) !important; border-bottom: 2px dotted var(--qolqolah); font-weight: bold; }

        .legend { background: #f0f0f0; padding: 12px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-around; font-size: 10px; flex-wrap: wrap; gap: 8px; border: 1px solid #ddd; }
        .legend-item { display: flex; align-items: center; font-weight: bold; }
        .dot { height: 10px; width: 10px; border-radius: 2px; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div id="clock">00:00:00</div>
    <div style="font-size: 10px; letter-spacing: 1px;">BERKAH TAJWID ENGINE V4.3</div>
</div>

<div class="container">
    <div id="legendContainer" style="display:none;">
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background:var(--izhar)"></span>Izhar</div>
            <div class="legend-item"><span class="dot" style="background:var(--bighunnah)"></span>Idgham Big.</div>
            <div class="legend-item"><span class="dot" style="background:var(--bilaghunnah)"></span>Idgham Bila.</div>
            <div class="legend-item"><span class="dot" style="background:var(--ikhfa)"></span>Ikhfa</div>
            <div class="legend-item"><span class="dot" style="background:var(--qolqolah)"></span>Qolqolah</div>
        </div>
    </div>
    
    <button id="btnBack" class="btn-back" onclick="backToList()">← DAFTAR SURAT</button>
    <div id="app"></div>
</div>

<script>
    function applyTajwid(text) {
        if (!text) return "";
        let p = text;

        // Karakter dasar hukum tajwid
        const huruf_ikhfa = "تثجدذزسشصضطظفقك";
        const huruf_bighunnah = "يَنْمُوْ";
        const huruf_bilaghunnah = "لر";
        const huruf_izhar = "أاھهحخعغ";
        const huruf_qolqolah = "قطبجد"; 

        // 1. HUKUM NUN MATI / TANWIN
        const patternNun = new RegExp(`([ن][\\u0652]|[ًٌٍ])([\\s]*)([${huruf_ikhfa}${huruf_bighunnah}${huruf_bilaghunnah}${huruf_izhar}])`, "g");
        p = p.replace(patternNun, (match, p1, p2, p3) => {
            let cls = "";
            if (new RegExp(`[${huruf_ikhfa}]`).test(p3)) cls = "ikhfa";
            else if (new RegExp(`[${huruf_bighunnah}]`).test(p3)) cls = "bighunnah";
            else if (new RegExp(`[${huruf_bilaghunnah}]`).test(p3)) cls = "bilaghunnah";
            else if (new RegExp(`[${huruf_izhar}]`).test(p3)) cls = "izhar";
            return `<span class="${cls}">${p1}${p2}${p3}</span>`;
        });

        // 2. HUKUM QOLQOLAH
        // A. Qolqolah Sugra (Mati asli dengan sukun di tengah kata)
        const patternSugra = new RegExp(`([${huruf_qolqolah}])([\\u0652])`, "g");
        p = p.replace(patternSugra, '<span class="qolqolah">$1$2</span>');

        // B. Qolqolah Kubra (Ditingkatkan: Deteksi huruf di akhir kata + abaikan tanda waqaf kecil)
        // Rentang \u0610-\u061A dan \u06D6-\u06DC menangkap tanda waqaf seperti Jim, Shola, Qola dll.
        const patternKubra = new RegExp(`([${huruf_qolqolah}])([\\u064B-\\u065F]?[\\u0610-\\u061A\\u06D6-\\u06DC]?)(?=\\s|$)`, "g");
        p = p.replace(patternKubra, '<span class="qolqolah">$1$2</span>');

        // 3. LAIN-LAIN (Al-Qomariyah & Izhar Syafawi)
        p = p.replace(/(ال[\u0652]?)(?=[أبجحخعغفقكموهي])/g, '<span class="izhar">$1</span>');
        p = p.replace(/(م[\u0652])([\s]*)([^مب\s])/g, '<span class="izhar">$1</span>$2$3');

        return p;
    }

    async function showList() {
        localStorage.removeItem('lastSurah');
        document.getElementById('btnBack').style.display = 'none';
        document.getElementById('legendContainer').style.display = 'none';
        const app = document.getElementById('app');
        app.innerHTML = '<div style="text-align:center; padding:20px;">Memuat Daftar Surat...</div>';
        try {
            const res = await fetch('https://equran.id/api/v2/surat');
            const data = await res.json();
            let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">';
            data.data.forEach(s => {
                html += `<div style="background:#eee;padding:15px;border-radius:10px;text-align:center;cursor:pointer;border:1px solid #ddd;" onclick="loadSurah(${s.nomor})"><b>${s.nomor}. ${s.namaLatin}</b></div>`;
            });
            app.innerHTML = html + '</div>';
        } catch(e) { app.innerHTML = "Gagal memuat. Periksa internet."; }
    }

    async function loadSurah(n) {
        localStorage.setItem('lastSurah', n);
        document.getElementById('btnBack').style.display = 'block';
        document.getElementById('legendContainer').style.display = 'block';
        const app = document.getElementById('app');
        app.innerHTML = '<div style="text-align:center; padding:20px;">Menganalisis Tajwid...</div>';
        window.scrollTo(0,0);
        try {
            const res = await fetch('https://equran.id/api/v2/surat/' + n);
            const data = await res.json();
            app.innerHTML = '';
            data.data.ayat.forEach(a => {
                app.innerHTML += `
                    <div class="ayat-card">
                        <div class="info-ayat">SURAH ${data.data.namaLatin} : AYAT ${a.nomorAyat}</div>
                        <div class="teks-arab">${applyTajwid(a.teksArab)}</div>
                    </div>`;
            });
        } catch(e) { app.innerHTML = "Gagal memuat ayat."; }
    }

    function backToList() { showList(); }
    
    setInterval(() => { 
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); 
    }, 1000);
    
    const last = localStorage.getItem('lastSurah');
    if(last) loadSurah(last); else showList();
</script>
</body>
</html>
