<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agit Studio - Universal Izhar Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00a86b; 
            --bg-body: #ffffff;    /* Background Utama Putih */
            --bg-card: #1e1e1e;    /* Box Ayat Tetap Hitam */
            --izhar: #ffff00; 
        }

        body { 
            background-color: var(--bg-body); 
            color: #333; 
            font-family: sans-serif; 
            margin: 0; 
        }

        .header { 
            background: var(--primary); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 3px solid #008f5a; 
            color: white; /* Pastikan teks header putih */
        }

        #clock { font-size: 22px; font-weight: bold; }
        
        .container { padding: 20px; }

        /* Box Ayat Tetap Gelap sesuai permintaan */
        .ayat-card { 
            background-color: var(--bg-card); 
            border-radius: 15px; 
            padding: 25px; 
            margin-bottom: 20px; 
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Efek bayangan di BG putih */
        }

        .teks-arab { 
            font-family: 'Amiri', serif; 
            font-size: 34px; 
            line-height: 2.8; 
            text-align: right; 
            direction: rtl; 
            word-spacing: 8px;
            color: white; /* Teks Arab tetap putih di dalam box hitam */
        }

        .izhar { 
            color: var(--izhar) !important; 
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255,255,0,0.6);
        }

        .info-ayat {
            color: var(--primary); 
            font-size: 12px; 
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <div id="clock">00:00:00</div>
    <div style="font-size: 10px; letter-spacing: 1px;">UNIVERSAL IZHAR PARSER PRO</div>
</div>

<div class="container" id="app">
    <div style="text-align:center; padding:50px;">Memproses Seluruh Ayat...</div>
</div>

<script>
    const IZHAR_RULES = {
        halqi: /([نًٌٍْ])\s*([أاھهحخعغ])/g,
        syafawi: /([مْ])\s*([^مب\s])/g,
        qomariyah: /(ال)\s*([أبجحخعغفقكموهي])/g
    };

    function applyIzhar(text) {
        let processed = text;
        processed = processed.replace(IZHAR_RULES.halqi, '<span class="izhar">$1</span> $2');
        processed = processed.replace(IZHAR_RULES.syafawi, '<span class="izhar">$1</span> $2');
        processed = processed.replace(IZHAR_RULES.qomariyah, '<span class="izhar">$1</span>$2');
        return processed;
    }

    async function loadSurah(nomorSurah = 1) {
        try {
            const response = await fetch(`https://equran.id/api/v2/surat/${nomorSurah}`);
            const json = await response.json();
            const container = document.getElementById('app');
            container.innerHTML = '';

            json.data.ayat.forEach(ayat => {
                const highligtedTeks = applyIzhar(ayat.teksArab);
                
                container.innerHTML += `
                    <div class="ayat-card">
                        <div class="info-ayat">SURAH ${json.data.namaLatin} : AYAT ${ayat.nomorAyat}</div>
                        <div class="teks-arab">${highligtedTeks}</div>
                    </div>
                `;
            });
        } catch (error) {
            document.getElementById('app').innerHTML = `<div style="color:red; text-align:center;">Gagal memuat data. Periksa koneksi internet.</div>`;
        }
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
    }, 1000);

    loadSurah(1); 
</script>
</body>
</html>
