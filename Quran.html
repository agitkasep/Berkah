<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Berkah - Tajwid & Transliterasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00a86b;
            --bg-body: #f8fafc;
            /* Warna Tajwid Standar */
            --ghunnah: #ff7e00; --ikhfa: #ff0000; --idgham: #2196f3;
            --iqlab: #4caf50; --qolqolah: #9c27b0; --mad: #e91e63;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: #1e293b; }
        .nav-header { padding: 15px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
        .btn-back { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--primary); margin-right: 10px; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .audio-card { background: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #eee; }
        .ayat-card { background: white; margin-bottom: 12px; padding: 25px 20px; border-radius: 18px; border: 1px solid #e2e8f0; }
        
        /* Teks Arab dengan Tajwid Otomatis */
        .teks-arab { font-family: 'Amiri', serif; font-size: 32px; text-align: right; line-height: 2.5; direction: rtl; margin-bottom: 15px; }
        .teks-latin { font-size: 14px; color: var(--primary); font-style: italic; margin-bottom: 8px; font-weight: 500; }
        .teks-indo { font-size: 14px; color: #475569; line-height: 1.6; border-top: 1px solid #f1f5f9; padding-top: 12px; }

        .btn-download { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--primary); background: white; color: var(--primary); font-weight: 700; margin-top: 10px; cursor: pointer; }
        .btn-download.saved { background: var(--primary); color: white; }
        .loading-text { text-align: center; padding: 50px; color: #94a3b8; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="nav-header"><b>Al-Qur'an Berkah</b></div>
        <div id="list-container" class="container"><div class="loading-text">Memuat Daftar Surat...</div></div>
    </div>

    <div id="detail-surat" style="display:none;">
        <div class="nav-header">
            <button class="btn-back" onclick="backToList()">⬅️</button>
            <b id="judul-surat"></b>
        </div>
        <div id="ayat-container" class="container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/alif-type/alif-tajwid@main/dist/alif-tajwid.min.js"></script>

    <script>
        const CACHE_NAME = 'berkah-quran-v3';

        // 1. Ambil Daftar Surat dari Quran.com API
        async function loadSurat() {
            const container = document.getElementById('list-container');
            try {
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=id');
                const json = await res.json();
                container.innerHTML = json.chapters.map(s => `
                    <div style="background:white; padding:15px; border-radius:12px; margin-bottom:8px; border:1px solid #eee; display:flex; justify-content:space-between; align-items:center;" onclick="openSurat(${s.id}, '${s.name_simple}')">
                        <div><b>${s.id}. ${s.name_simple}</b><br><small>${s.translated_name.name} • ${s.verses_count} Ayat</small></div>
                        <div style="font-family:'Amiri'; font-size:20px; color:var(--primary);">${s.name_arabic}</div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "Gagal memuat daftar surat."; }
        }

        // 2. Ambil Ayat, Latin, Terjemahan, dan Audio
        async function openSurat(id, nama) {
            const container = document.getElementById('ayat-container');
            document.getElementById('main-view').style.display = "none";
            document.getElementById('detail-surat').style.display = "block";
            document.getElementById('judul-surat').innerText = nama;
            container.innerHTML = '<div class="loading-text">Mempersiapkan Ayat & Tajwid...</div>';
            window.scrollTo(0,0);

            try {
                // Fetch Ayat (Indonesian Translation ID 33 = Kemenag)
                const res = await fetch(`https://api.quran.com/api/v4/verses/by_chapter/${id}?language=id&words=false&translations=33&fields=text_uthmani,text_indonesia`);
                const json = await res.json();
                
                // Fetch Audio Info
                const audioRes = await fetch(`https://api.quran.com/api/v4/chapter_recitations/7/${id}`); // Reciter 7 = Mishary Rashid Alafasy
                const audioJson = await audioRes.json();
                const audioUrl = audioJson.audio_file.audio_url;

                // Fetch Latin (Transliteration) secara paralel
                // (Catatan: Quran.com API memerlukan request terpisah untuk transliterasi atau diproses manual)
                // Di sini kita gunakan fallback latin dari API alternatif untuk kecepatan
                const latinRes = await fetch(`https://equran.id/api/v2/surat/${id}`);
                const latinJson = await latinRes.json();
                const latinData = latinJson.data.ayat;

                const isSaved = await checkCache(audioUrl);

                let html = `
                    <div class="audio-card">
                        <audio controls style="width:100%"><source src="${audioUrl}" type="audio/mpeg"></audio>
                        <button id="dl-btn" class="btn-download ${isSaved ? 'saved' : ''}" onclick="downloadAudio('${audioUrl}')">
                            ${isSaved ? '✅ Tersimpan Offline' : '📥 Download Audio'}
                        </button>
                    </div>
                `;

                json.verses.forEach((v, index) => {
                    const teksArab = alifTajwid.render(v.text_uthmani);
                    const latin = latinData[index] ? latinData[index].teksLatin : "...";
                    const arti = v.translations[0].text;

                    html += `
                        <div class="ayat-card">
                            <div style="font-size:12px; color:var(--primary); margin-bottom:12px; font-weight:700;">AYAT ${v.verse_number}</div>
                            <div class="teks-arab">${teksArab}</div>
                            <div class="teks-latin">${latin}</div>
                            <div class="teks-indo">${arti}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (e) { 
                container.innerHTML = `<div class="loading-text">Gagal memuat ayat. Pastikan internet stabil.</div>`; 
            }
        }

        async function downloadAudio(url) {
            const btn = document.getElementById('dl-btn');
            btn.innerText = "⚡ Mengunduh...";
            try {
                const cache = await caches.open(CACHE_NAME);
                await cache.add(url);
                btn.innerText = "✅ Tersimpan Offline";
                btn.classList.add('saved');
            } catch (e) { alert("Gagal simpan audio."); }
        }

        async function checkCache(url) {
            try {
                const cache = await caches.open(CACHE_NAME);
                return !!(await cache.match(url));
            } catch (e) { return false; }
        }

        function backToList() {
            document.getElementById('main-view').style.display = "block";
            document.getElementById('detail-surat').style.display = "none";
        }

        loadSurat();
    </script>
</body>
</html>
