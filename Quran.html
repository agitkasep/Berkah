<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Qur'an Berkah</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00a86b; --ghunnah: #ff7e00; --ikhfa: #ff0000; --idgham: #2196f3; --qlq: #9c27b0; --mad: #e91e63; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; color: #1e293b; }
        .nav-header { padding: 15px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; }
        .btn-back { border: none; background: none; font-size: 20px; cursor: pointer; color: var(--primary); margin-right: 10px; }
        .container { max-width: 600px; margin: 0 auto; padding: 10px; }
        .audio-card { background: white; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #eee; }
        .ayat-card { background: white; margin-bottom: 15px; padding: 25px 20px; border-radius: 18px; border: 1px solid #e2e8f0; }
        .teks-arab { font-family: 'Amiri', serif; font-size: 32px; text-align: right; line-height: 2.5; direction: rtl; margin-bottom: 15px; }
        .teks-latin { font-size: 14px; color: var(--primary); font-style: italic; margin-bottom: 8px; }
        .teks-indo { font-size: 14px; color: #475569; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .loading-text { text-align: center; padding: 50px; color: #94a3b8; }
        /* Tajwid Classes */
        .ghn { color: var(--ghunnah) !important; font-weight: bold; }
        .ikh { color: var(--ikhfa) !important; font-weight: bold; }
        .idg { color: var(--idgham) !important; }
        .qlq { color: var(--qlq) !important; font-weight: bold; }
        .mad { color: var(--mad) !important; }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="nav-header"><b>Al-Qur'an Berkah</b></div>
        <div id="list-container" class="container"></div>
    </div>

    <div id="detail-surat" style="display:none;">
        <div class="nav-header">
            <button class="btn-back" onclick="backToList()">⬅️</button>
            <b id="judul-surat"></b>
        </div>
        <div id="ayat-container" class="container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/alif-type/alif-tajwid@main/dist/alif-tajwid.min.js"></script>

    <script>
        // 1. Load Daftar Surat
        async function loadSurat() {
            const container = document.getElementById('list-container');
            container.innerHTML = '<div class="loading-text">Memuat Al-Qur\'an...</div>';
            try {
                const res = await fetch('https://api.alquran.cloud/v1/surah');
                const json = await res.json();
                container.innerHTML = json.data.map(s => `
                    <div style="background:white; padding:15px; border-radius:12px; margin-bottom:8px; border:1px solid #eee; display:flex; justify-content:space-between; align-items:center;" onclick="openSurat(${s.number}, '${s.englishName}')">
                        <div><b>${s.number}. ${s.englishName}</b><br><small>${s.englishNameTranslation}</small></div>
                        <div style="font-family:'Amiri'; font-size:20px; color:var(--primary);">${s.name}</div>
                    </div>
                `).join('');
            } catch (e) { container.innerHTML = "Gagal memuat. Periksa internet."; }
        }

        // 2. Load Ayat (Tajwid, Latin, Terjemahan, Audio disatukan)
        async function openSurat(nomor, nama) {
            const container = document.getElementById('ayat-container');
            document.getElementById('main-view').style.display = "none";
            document.getElementById('detail-surat').style.display = "block";
            document.getElementById('judul-surat').innerText = nama;
            container.innerHTML = '<div class="loading-text">Sedang Menyiapkan Mushaf...</div>';
            window.scrollTo(0,0);

            try {
                // Ambil Arab, Terjemahan (id.indonesian), dan Latin (en.transliteration) sekaligus
                const res = await fetch(`https://api.alquran.cloud/v1/surah/${nomor}/editions/quran-uthmani,id.indonesian,en.transliteration`);
                const json = await res.json();
                
                const arabAyat = json.data[0].ayahs;
                const indoAyat = json.data[1].ayahs;
                const latinAyat = json.data[2].ayahs;

                let html = `
                    <div class="audio-card">
                        <audio controls style="width:100%">
                            <source src="https://cdn.islamic.network/quran/audio-surah/128/ar.alafasy/${nomor}.mp3" type="audio/mpeg">
                        </audio>
                        <p style="font-size:11px; margin-top:5px; color:grey;">Audio Syeikh Mishary Rashid</p>
                    </div>
                `;

                arabAyat.forEach((ayat, i) => {
                    const teksTajwid = alifTajwid.render(ayat.text);
                    html += `
                        <div class="ayat-card">
                            <div style="font-size:12px; color:var(--primary); margin-bottom:12px; font-weight:700;">AYAT ${ayat.numberInSurah}</div>
                            <div class="teks-arab">${teksTajwid}</div>
                            <div class="teks-latin">${latinAyat[i].text}</div>
                            <div class="teks-indo">${indoAyat[i].text}</div>
                        </div>
                    `;
                });

                container.innerHTML = html;
            } catch (e) { 
                container.innerHTML = "<div class='loading-text'>Gagal memuat ayat. Coba ulangi.</div>"; 
            }
        }

        function backToList() {
            document.getElementById('main-view').style.display = "block";
            document.getElementById('detail-surat').style.display = "none";
        }

        loadSurat();
    </script>
</body>
</html>
